<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mixapi 控制台</title>
<style>
  :root{
    --bg:#f3f4f6; --panel:#ffffff; --panel2:#f8fafc; --ink:#111827; --muted:#6b7280; --faint:#9ca3af;
    --line:#e5e7eb; --line2:#d1d5db;
    --accent:#4f46e5; --accent-hover:#4338ca; --accent-soft:rgba(79,70,229,.09); --accent-ink:#4338ca; --on-accent:#ffffff;
    --ok:#15803d; --ok-soft:rgba(22,163,74,.12);
    --warn:#b45309; --warn-soft:rgba(217,119,6,.14);
    --err:#dc2626; --err-soft:rgba(220,38,38,.1);
    --grey:#6b7280; --grey-soft:rgba(107,114,128,.14);
    --slate:#64748b; --slate-soft:rgba(100,116,139,.14);
    --shadow-sm:0 1px 2px rgba(16,24,40,.05);
    --shadow-md:0 4px 10px -2px rgba(16,24,40,.08),0 2px 4px -2px rgba(16,24,40,.04);
    --shadow-lg:0 20px 44px -12px rgba(16,24,40,.2);
    --ring:0 0 0 3px rgba(79,70,229,.15);
    --shimmer:rgba(255,255,255,.55);
  }
  /* system-preference default: only takes effect while no explicit theme is chosen */
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0d1117; --panel:#161b24; --panel2:#1b2230; --ink:#e5e8ee; --muted:#98a2b3; --faint:#667085;
      --line:#262e3d; --line2:#323b4d;
      --accent:#818cf8; --accent-hover:#a5b4fc; --accent-soft:rgba(129,140,248,.14); --accent-ink:#a5b4fc; --on-accent:#17153a;
      --ok:#4ade80; --ok-soft:rgba(74,222,128,.14);
      --warn:#fbbf24; --warn-soft:rgba(251,191,36,.15);
      --err:#f87171; --err-soft:rgba(248,113,113,.14);
      --grey:#9ca3af; --grey-soft:rgba(156,163,175,.16);
      --slate:#94a3b8; --slate-soft:rgba(148,163,184,.16);
      --shadow-sm:0 1px 2px rgba(0,0,0,.3);
      --shadow-md:0 4px 12px -2px rgba(0,0,0,.4);
      --shadow-lg:0 20px 44px -12px rgba(0,0,0,.55);
      --ring:0 0 0 3px rgba(129,140,248,.22);
      --shimmer:rgba(255,255,255,.07);
    }
  }
  /* explicit user choice (persisted in localStorage) — outranks the media query via specificity */
  :root[data-theme="light"]{
    --bg:#f3f4f6; --panel:#ffffff; --panel2:#f8fafc; --ink:#111827; --muted:#6b7280; --faint:#9ca3af;
    --line:#e5e7eb; --line2:#d1d5db;
    --accent:#4f46e5; --accent-hover:#4338ca; --accent-soft:rgba(79,70,229,.09); --accent-ink:#4338ca; --on-accent:#ffffff;
    --ok:#15803d; --ok-soft:rgba(22,163,74,.12);
    --warn:#b45309; --warn-soft:rgba(217,119,6,.14);
    --err:#dc2626; --err-soft:rgba(220,38,38,.1);
    --grey:#6b7280; --grey-soft:rgba(107,114,128,.14);
    --slate:#64748b; --slate-soft:rgba(100,116,139,.14);
    --shadow-sm:0 1px 2px rgba(16,24,40,.05);
    --shadow-md:0 4px 10px -2px rgba(16,24,40,.08),0 2px 4px -2px rgba(16,24,40,.04);
    --shadow-lg:0 20px 44px -12px rgba(16,24,40,.2);
    --ring:0 0 0 3px rgba(79,70,229,.15);
    --shimmer:rgba(255,255,255,.55);
  }
  :root[data-theme="dark"]{
    --bg:#0d1117; --panel:#161b24; --panel2:#1b2230; --ink:#e5e8ee; --muted:#98a2b3; --faint:#667085;
    --line:#262e3d; --line2:#323b4d;
    --accent:#818cf8; --accent-hover:#a5b4fc; --accent-soft:rgba(129,140,248,.14); --accent-ink:#a5b4fc; --on-accent:#17153a;
    --ok:#4ade80; --ok-soft:rgba(74,222,128,.14);
    --warn:#fbbf24; --warn-soft:rgba(251,191,36,.15);
    --err:#f87171; --err-soft:rgba(248,113,113,.14);
    --grey:#9ca3af; --grey-soft:rgba(156,163,175,.16);
    --slate:#94a3b8; --slate-soft:rgba(148,163,184,.16);
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow-md:0 4px 12px -2px rgba(0,0,0,.4);
    --shadow-lg:0 20px 44px -12px rgba(0,0,0,.55);
    --ring:0 0 0 3px rgba(129,140,248,.22);
    --shimmer:rgba(255,255,255,.07);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;-webkit-font-smoothing:antialiased;
    font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink)}
  ::selection{background:var(--accent-soft)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-track{background:transparent}
  h1,h2,h3,h4{letter-spacing:-.01em}
  a{color:var(--accent)}

  /* ---- buttons ---- */
  button{display:inline-flex;align-items:center;justify-content:center;gap:6px;
    font:inherit;font-weight:500;cursor:pointer;border:1px solid var(--line2);background:var(--panel);color:var(--ink);
    border-radius:8px;padding:0 12px;height:32px;box-shadow:var(--shadow-sm);
    transition:background .15s,border-color .15s,color .15s,box-shadow .15s,transform .05s}
  button:hover{background:var(--panel2);border-color:var(--faint)}
  button:active{transform:translateY(1px)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  button.primary{background:var(--accent);color:var(--on-accent);border-color:transparent}
  button.primary:hover{background:var(--accent-hover);border-color:transparent}
  button.danger{color:var(--err);border-color:var(--err);background:transparent;box-shadow:none}
  button.danger:hover{background:var(--err-soft);border-color:var(--err)}
  button:disabled{opacity:.55;cursor:not-allowed;transform:none}
  button svg{width:15px;height:15px;flex:none}
  /* compact action buttons inside tables */
  td button{height:26px;padding:0 8px;font-size:12px;font-weight:400;border-radius:6px;box-shadow:none}

  /* ---- inputs ---- */
  input,select,textarea{font:inherit;padding:6px 10px;border:1px solid var(--line2);border-radius:8px;
    background:var(--panel);color:var(--ink);transition:border-color .15s,box-shadow .15s}
  input:not([type="checkbox"]),select{height:32px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:var(--ring)}
  input::placeholder,textarea::placeholder{color:var(--faint)}
  input[type="checkbox"]{accent-color:var(--accent);width:14px;height:14px}
  textarea{resize:vertical}

  /* ---- tables (inside a .wrap card) ---- */
  .wrap{overflow-x:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm)}
  table{border-collapse:collapse;width:100%}
  th,td{border-bottom:1px solid var(--line);padding:9px 12px;text-align:left;vertical-align:top;font-size:13px}
  th{background:var(--panel2);color:var(--muted);font-weight:600;font-size:12px;white-space:nowrap}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:var(--panel2)}

  /* ---- badges: soft pill + status dot ---- */
  .badge{display:inline-flex;align-items:center;gap:6px;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap}
  .badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
  .b-healthy{color:var(--ok);background:var(--ok-soft)}
  .b-cooling{color:var(--warn);background:var(--warn-soft)}
  .b-exhausted{color:var(--err);background:var(--err-soft)}
  .b-disabled{color:var(--grey);background:var(--grey-soft)}
  .b-unknown{color:var(--slate);background:var(--slate-soft)}

  .muted{color:var(--muted)} .err{color:var(--err)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px}

  /* ---- login ---- */
  #login{max-width:372px;margin:12vh auto;padding:32px 30px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shadow-lg)}
  .login-logo{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:#fff;
    background:linear-gradient(135deg,var(--accent),#9333ea);margin-bottom:16px;box-shadow:var(--shadow-md)}
  .login-logo svg{width:24px;height:24px}
  #login h1{margin:0 0 4px;font-size:20px}
  #login p{margin:0 0 18px;color:var(--muted)}
  #login input{width:100%;height:36px;margin-bottom:12px}
  #login button{width:100%;height:36px}

  /* ---- app shell ---- */
  #app{display:none;min-height:100vh;grid-template-columns:232px 1fr}
  nav{background:var(--panel);border-right:1px solid var(--line);padding:16px 12px;display:flex;flex-direction:column;gap:2px}
  nav .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;padding:4px 10px 14px}
  nav .brand .logo{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;color:#fff;flex:none;
    background:linear-gradient(135deg,var(--accent),#9333ea)}
  nav .brand .logo svg{width:15px;height:15px}
  nav .nav-label{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--faint);padding:2px 10px 6px}
  nav button{justify-content:flex-start;background:transparent;border:none;box-shadow:none;text-align:left;
    padding:7px 10px;border-radius:8px;width:100%;height:auto;color:var(--muted);font-weight:500}
  nav button:hover{background:var(--panel2);color:var(--ink)}
  nav button:active{transform:none}
  nav button.active{background:var(--accent-soft);color:var(--accent-ink)}
  nav button svg{width:16px;height:16px}
  nav .spacer{flex:1}
  main{padding:26px 30px;min-width:0}
  main h2{margin:0;font-size:20px}
  main h3{margin:22px 0 10px;font-size:15px}
  main h4{margin:12px 0 6px;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.04em}
  #view{max-width:1180px}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .page-head h2{margin:0;font-size:20px}
  .page-head .desc{margin:5px 0 0;color:var(--muted);font-size:13px}

  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .filters{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow-sm)}

  /* ---- cards ---- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm);padding:16px 18px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:14px}
  .stat-grid .card{transition:box-shadow .15s}
  .stat-grid .card:hover{box-shadow:var(--shadow-md)}
  .card .n{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin-top:8px}
  .card .l{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px}
  .card .l svg{width:14px;height:14px}

  /* ---- modal / toast ---- */
  #modal{position:fixed;inset:0;background:rgba(13,17,23,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  #modal .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;max-width:480px;width:100%;
    box-shadow:var(--shadow-lg);max-height:86vh;overflow-y:auto;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:scale(.97) translateY(8px)}}
  #toast{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:10px;z-index:60}
  #toast div{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
    border-left:3px solid var(--accent);padding:10px 14px;border-radius:10px;max-width:360px;font-size:13px;
    box-shadow:var(--shadow-md);animation:toastIn .18s ease}
  #toast div.err{border-left-color:var(--err)}
  #toast div svg{width:14px;height:14px;flex:none;color:var(--accent)}
  #toast div.err svg{color:var(--err)}
  #toast div.out{opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px)}}

  /* ---- loading skeleton ---- */
  .skel{background:var(--panel2);border-radius:6px;position:relative;overflow:hidden;min-height:12px}
  .skel::after{content:'';position:absolute;inset:0;transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,var(--shimmer),transparent);animation:shimmer 1.3s infinite}
  @keyframes shimmer{to{transform:translateX(100%)}}

  /* ---- empty state ---- */
  .empty{padding:40px 16px;text-align:center;color:var(--muted)}
  .empty svg{width:22px;height:22px;color:var(--faint);display:block;margin:0 auto 8px}

  /* ---- responsive: sidebar becomes a top bar ---- */
  @media (max-width:900px){
    #app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    nav{flex-direction:row;align-items:center;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:10px 12px;gap:4px}
    nav .brand{padding:0 8px 0 2px}
    nav .nav-label{display:none}
    nav button{width:auto;white-space:nowrap}
    main{padding:16px}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
  <!-- LOGIN VIEW -->
  <div id="login" style="display:none">
    <div class="login-logo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg></div>
    <h1>mixapi 控制台</h1>
    <p>输入管理员密钥以登录。</p>
    <input id="loginKey" type="password" placeholder="管理员密钥" autocomplete="off">
    <button id="loginBtn" class="primary">登录</button>
    <p id="loginErr" class="err" style="display:none;margin-top:12px"></p>
  </div>

  <!-- APP VIEW -->
  <div id="app">
    <nav>
      <div class="brand"><span class="logo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg></span><span>mixapi</span></div>
      <div class="nav-label">管理</div>
      <button data-tab="pool" data-icon="pool" class="active">账号池</button>
      <button data-tab="logs" data-icon="logs">日志</button>
      <button data-tab="stats" data-icon="stats">用量</button>
      <button data-tab="keys" data-icon="keys">密钥</button>
      <button data-tab="playground" data-icon="playground">调试台</button>
      <div class="spacer"></div>
      <button id="themeBtn" title="切换主题:跟随系统 / 亮色 / 暗色"></button>
      <button id="logoutBtn" data-icon="logout">退出</button>
    </nav>
    <main><div id="view"></div></main>
  </div>

  <div id="modal"><div class="box" id="modalBox"></div></div>
  <div id="toast"></div>

<script>
"use strict";
const $ = (s, r=document) => r.querySelector(s);
const el = (tag, props={}, kids=[]) => {           // tiny DOM builder — NO innerHTML for data
  const n = document.createElement(tag);
  for (const k in props){
    if (k === 'class') n.className = props[k];
    else if (k === 'text') n.textContent = props[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), props[k]);
    else if (props[k] != null) n.setAttribute(k, props[k]);
  }
  for (const c of [].concat(kids)) if (c != null) n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
};

// ---- inline SVG icons (stroke style, 24x24 grid) ----
// innerHTML is used ONLY with these constant path strings — never with data.
const ICONS = {
  pool: '<rect x="3" y="4" width="18" height="7" rx="2"/><rect x="3" y="13" width="18" height="7" rx="2"/><path d="M7 7.5h.01M7 16.5h.01"/>',
  logs: '<path d="M8 6h13M8 12h13M8 18h13M3.5 6h.01M3.5 12h.01M3.5 18h.01"/>',
  stats: '<path d="M3 3v18h18"/><path d="M8 17v-5M13 17V8M18 17v-8"/>',
  keys: '<circle cx="8" cy="15" r="4"/><path d="M11.2 11.8L20 3M15 5l3 3"/>',
  playground: '<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9l3 3-3 3M12.5 15H17"/>',
  logout: '<path d="M9 21H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3M15 16l4-4-4-4M19 12H9"/>',
  sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>',
  moon: '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>',
  monitor: '<rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/>',
  plus: '<path d="M12 5v14M5 12h14"/>',
  refresh: '<path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/>',
  download: '<path d="M12 3v12M7 10l5 5 5-5M4 20h16"/>',
  search: '<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  send: '<path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/>',
  wand: '<path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9L12 3z"/><path d="M18.5 15l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9.9-2.6z"/>',
  copy: '<rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
  inbox: '<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.4 5.2L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.4-6.8A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.8 1.2z"/>',
  check: '<path d="M20 6L9 17l-5-5"/>',
  alert: '<circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16.5h.01"/>',
  alertTri: '<path d="M10.3 3.8L1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.8a2 2 0 0 0-3.4 0zM12 9v4M12 17h.01"/>',
  activity: '<path d="M22 12h-4l-3 8-6-16-3 8H2"/>',
  hash: '<path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18"/>',
  dollar: '<circle cx="12" cy="12" r="9"/><path d="M12 6.5v11M15 9c-.6-1-1.7-1.5-3-1.5-1.8 0-3 1-3 2.3 0 3.2 6 1.7 6 4.9 0 1.4-1.3 2.3-3 2.3-1.5 0-2.7-.6-3.3-1.7"/>',
};
function icon(name){
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor');
  svg.setAttribute('stroke-width', '2');
  svg.setAttribute('stroke-linecap', 'round');
  svg.setAttribute('stroke-linejoin', 'round');
  svg.innerHTML = ICONS[name] || '';   // constant strings only — no user data
  return svg;
}

async function api(path, opts={}){
  const r = await fetch(path, {
    credentials:'same-origin',
    headers:{'content-type':'application/json'},
    ...opts,
  });
  if (r.status === 401){ showLogin(); throw new Error('unauthorized'); }
  const ct = r.headers.get('content-type') || '';
  const body = ct.includes('json') ? await r.json() : await r.text();
  if (!r.ok) throw new Error((body && body.error) || ('HTTP ' + r.status));
  return body;
}

function toast(msg, isErr){
  const t = el('div', { class: isErr ? 'err' : '' }, [ icon(isErr ? 'alert' : 'check'), String(msg) ]);
  $('#toast').append(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 220); }, 4200);
}

// promise-based in-page confirm (NEVER window.confirm)
function confirmModal(message, confirmLabel='确认', danger=false){
  return new Promise((resolve) => {
    const box = $('#modalBox'); box.textContent='';
    box.append(el('p', { text: message, style:'margin:0 0 18px' }));
    const bar = el('div', { class:'row', style:'margin:0;justify-content:flex-end' }, [
      el('button', { text:'取消', onclick: () => { close(); resolve(false); } }),
      el('button', { text: confirmLabel, class: danger ? 'danger' : 'primary',
        onclick: () => { close(); resolve(true); } }),
    ]);
    box.append(bar);
    $('#modal').style.display='flex';
    function close(){ $('#modal').style.display='none'; }
  });
}
// show an arbitrary node in the modal (used by Keys "show once")
function showModal(node){
  const b=$('#modalBox'); b.textContent=''; b.append(node); $('#modal').style.display='flex';
  const f = b.querySelector('input,textarea,select');   // autofocus the first field of forms;

// ---- theme (light/dark/system; unset = follow system via prefers-color-scheme) ----
const THEME_KEY = 'mixapi-theme';
function themeMode(){
  const t = document.documentElement.getAttribute('data-theme');
  return (t === 'light' || t === 'dark') ? t : 'system';
}
function isDarkNow(){
  const t = document.documentElement.getAttribute('data-theme');
  if (t === 'dark') return true;
  if (t === 'light') return false;
  return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
}
function updateThemeBtn(){
  const mode = themeMode();
  const btn = $('#themeBtn'); btn.textContent='';
  btn.append(
    icon(mode === 'dark' ? 'moon' : mode === 'light' ? 'sun' : 'monitor'),
    mode === 'dark' ? '暗色' : mode === 'light' ? '亮色' : '跟随系统',
  );
}
function applyTheme(mode){
  if (mode === 'dark' || mode === 'light') document.documentElement.setAttribute('data-theme', mode);
  else document.documentElement.removeAttribute('data-theme');
  updateThemeBtn();
}
function toggleTheme(){
  const order = ['system', 'light', 'dark'];
  const next = order[(order.indexOf(themeMode()) + 1) % order.length];
  applyTheme(next === 'system' ? null : next);
  try{ localStorage.setItem(THEME_KEY, next); }catch{}
}
(function initTheme(){
  let saved = null;
  try{ saved = localStorage.getItem(THEME_KEY); }catch{}
  applyTheme(saved === 'dark' || saved === 'light' ? saved : null);
})();

// ---- render-generation guard ----

// ---- model list parsing ----
function parseModels(text){
  return String(text||'').split(/[\n,]/).map(s=>s.trim()).filter(Boolean).map(tok=>{
    const i = tok.indexOf(':');                          // split on FIRST colon only —
    const pub = (i === -1 ? tok : tok.slice(0, i)).trim(); // target IDs may contain colons (e.g. llama3:8b)
    const tgt = (i === -1 ? '' : tok.slice(i + 1)).trim();
    return { public: pub, target: tgt || pub };
  });
}
function modelsToText(models){ return (models||[]).map(m => m.public===m.target ? m.public : m.public+':'+m.target).join('\n'); }

async function detectModelsInto(modelsInp, adapter, baseUrl, key){

    if (!r.models || !r.models.length){ toast('未检测到模型,请手动填写', true); return; }
    modelsInp.value = r.models.join('\n');
    toast('检测到 ' + r.models.length + ' 个模型,已填入(可编辑后保存)');
  } catch(e){ toast(e.message, true); }
}

function orDash(v, suffix=''){ return (v === null || v === undefined) ? '—' : (v + suffix); }

const LOG_STATUS_LABELS = { ok:'成功', error:'失败' };

  { label:'近 1 小时', value: 3600e3 },
  { label:'近 24 小时', value: 86400e3 },

];
const LOG_LIMITS = [25, 50, 100, 200];

// escape a single CSV field: wrap in quotes (doubling inner quotes) if it
// contains a comma, quote, or newline.
function csvField(v){
  let s = String(v == null ? '' : v);
  // CSV formula-injection guard: a cell a spreadsheet would evaluate as a formula
  // (leading = + - @ tab CR — reachable via a client-chosen model/account name)
  // is neutralized by prefixing a single quote so it's treated as text.
  if (/^[=+\-@\t\r]/.test(s)) s = "'" + s;
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function logsToCsv(rows){
  const header = ['时间','模型','账号','状态','HTTP','延迟ms','尝试','tokens','成本'];
  const lines = [header.map(csvField).join(',')];
  for (const r of rows){
    lines.push([
      r.ts ? new Date(r.ts).toISOString() : '',
      r.public_model ?? '',
      nameForAccount(r.account_id),
      LOG_STATUS_LABELS[r.status] || r.status || '',
      r.http_status ?? '',
      r.latency_ms ?? '',
      r.attempt_count ?? '',
      r.total_tokens ?? '',
      r.est_cost ?? '',
    ].map(csvField).join(','));
  }
  return lines.join('\n');
}
function downloadCsv(filename, csv){
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = el('a', { href:url, download:filename });
  document.body.append(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

      el('td', { text: orDash(r.public_model) }),
      el('td', { text: nameForAccount(r.account_id) }),
      el('td', {}, [ el('span', { class:'badge ' + cls, text: LOG_STATUS_LABELS[r.status] || r.status }) ]),
      el('td', { text: orDash(r.http_status) }),
      el('td', { text: orDash(r.latency_ms, 'ms') }),
      el('td', { text: orDash(r.attempt_count) }),
      el('td', { text: orDash(r.total_tokens) }),
      el('td', { text: fmtCost(r.est_cost) }),
    ]);
  });
  if (!bodyRows.length){
    bodyRows.push(emptyRow(9, '没有符合条件的日志。'));
  }

  const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, bodyRows) ]);
  view.append(el('div', { class:'wrap' }, [table]));

  const atStart = logsState.offset <= 0;
  const atEnd = logsState.offset + rows.length >= total;
  const rangeLabel = total > 0
    ? `第 ${logsState.offset + 1}–${logsState.offset + rows.length} / 共 ${total} 条`
    : '共 0 条';
  view.append(el('div', { class:'row', style:'margin-top:14px' }, [
    el('button', { text:'上一页', disabled: atStart || null, onclick: () => {
      logsState.offset = Math.max(0, logsState.offset - limitNum);
      refresh();
    } }),
    el('button', { text:'下一页', disabled: atEnd || null, onclick: () => {
      logsState.offset = Math.min(logsState.offset + limitNum, Math.max(0, total - 1));
      refresh();
    } }),
    el('span', { class:'muted', text: rangeLabel }),
  ]));
}

const STATS_WINDOWS = [
  { label:'最近 1 小时', value: 3600e3 },
  { label:'最近 24 小时', value: 86400e3 },
  { label:'最近 7 天', value: 7 * 86400e3 },
  { label:'全部时间', value: 0 },
];
const statsState = { windowMs: 86400e3 };  // default: Last 24h

// ---- tiny SVG helpers (no library; theme colors pulled from CSS vars at render time) ----
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs={}){
  const n = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) if (attrs[k] != null) n.setAttribute(k, attrs[k]);
  return n;
}
function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

// grouped-bar trend chart: requests + errors per bucket, over time
function renderTrendChart(series){
  if (!series || !series.length){
    return el('p', { class:'muted', text:'暂无数据' });
  }
  const accent = cssVar('--accent'), err = cssVar('--err'), line = cssVar('--line'), muted = cssVar('--muted');
  const W = 720, H = 220, padL = 40, padR = 12, padT = 12, padB = 28;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const maxV = Math.max(1, ...series.map(p => Math.max(p.requests, p.errors)));
  const n = series.length;
  const groupW = innerW / n;
  const barW = Math.max(1, Math.min(14, groupW * 0.36));

  const svg = svgEl('svg', { viewBox: `0 0 ${W} ${H}`, style:'width:100%;height:auto;display:block' });

  // axis line
  svg.append(svgEl('line', { x1:padL, y1:padT+innerH, x2:padL+innerW, y2:padT+innerH, stroke:line, 'stroke-width':1 }));

  series.forEach((p, i) => {
    const cx = padL + groupW * (i + 0.5);
    const rH = (p.requests / maxV) * innerH;
    const eH = (p.errors / maxV) * innerH;
    svg.append(svgEl('rect', {
      x: cx - barW - 1, y: padT + innerH - rH, width: barW, height: Math.max(0, rH), fill: accent, rx:2,
    }));
    svg.append(svgEl('rect', {
      x: cx + 1, y: padT + innerH - eH, width: barW, height: Math.max(0, eH), fill: err, rx:2,
    }));
  });

  // a handful of x-axis time ticks
  const tickCount = Math.min(6, n);
  for (let t = 0; t < tickCount; t++){
    const idx = tickCount === 1 ? 0 : Math.round(t * (n - 1) / (tickCount - 1));
    const cx = padL + groupW * (idx + 0.5);
    const label = new Date(series[idx].bucket).toLocaleString(undefined,
      { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    const txt = svgEl('text', { x:cx, y:H-8, 'text-anchor':'middle', 'font-size':'10', fill:muted });
    txt.textContent = label;
    svg.append(txt);
  }

  const legend = el('div', { class:'row', style:'margin:6px 0 0;gap:16px' }, [
    el('span', { style:`font-size:12px;color:${accent}`, text:'■ 请求' }),
    el('span', { style:`font-size:12px;color:${err}`, text:'■ 错误' }),
  ]);

  return el('div', {}, [ el('div', { class:'wrap' }, [svg]), legend ]);
}

// horizontal-bar distribution group: one row per entry, bar scaled to the group max
function renderDistGroup(title, groups, nameFor){
  const body = [];
  if (!groups || !groups.length){
    body.push(el('p', { class:'muted', text:'暂无数据' }));
  } else {
    const accent = cssVar('--accent'), line = cssVar('--line'), ink = cssVar('--ink');
    const maxV = Math.max(1, ...groups.map(g => g.requests));
    const W = 640, rowH = 24, H = rowH * groups.length;
    const labelW = 160, padR = 60;
    const barMaxW = W - labelW - padR;
    const svg = svgEl('svg', { viewBox:`0 0 ${W} ${H}`, style:'width:100%;height:auto;display:block' });
    groups.forEach((g, i) => {
      const y = i * rowH;
      const name = nameFor ? nameFor(g.key) : String(g.key);
      const w = (g.requests / maxV) * barMaxW;
      const label = svgEl('text', { x:0, y:y+rowH/2+4, 'font-size':'12', fill:ink });
      label.textContent = name.length > 20 ? name.slice(0, 20) + '…' : name;
      svg.append(label);
      svg.append(svgEl('rect', { x:labelW, y:y+4, width:barMaxW, height:rowH-10, fill:'none', stroke:line, rx:3 }));
      svg.append(svgEl('rect', { x:labelW, y:y+4, width:Math.max(0, w), height:rowH-10, fill:accent, rx:3 }));
      const val = svgEl('text', { x:labelW+barMaxW+8, y:y+rowH/2+4, 'font-size':'12', fill:ink });
      val.textContent = fmtNum(g.requests);
      svg.append(val);
    });
    body.push(el('div', { class:'wrap' }, [svg]));
  }
  return el('div', {}, [
    el('h4', { text:title }),
    ...body,
  ]);
}

async function renderStats(gen){
  const view = $('#view');
  view.append(skeletonStats());
  const sinceMs = statsState.windowMs === 0 ? 0 : Date.now() - statsState.windowMs;
  const stats = await api('/admin/stats?sinceMs=' + sinceMs);
  if (gen !== _renderGen) return;   // a newer render (tab switch/window change) has superseded this one
  view.textContent = '';

  function refresh(){
    const g = ++_renderGen;
    $('#view').textContent='';
    renderStats(g).catch(e => { if (g === _renderGen) toast(e.message, true); });
  }

  function statCard(label, value, iconName){
    return el('div', { class:'card' }, [
      el('div', { class:'l' }, [ icon(iconName), label ]),
      el('div', { class:'n', text:String(value) }),
    ]);
  }
  function groupTable(title, groups){
    const headRow = el('tr', {}, ['键','请求','错误','Token','成本'].map(h => el('th', { text:h })));
    const rows = (groups || []).map(g => el('tr', {}, [
      el('td', { text:String(g.key) }),
      el('td', { text:String(g.requests) }),
      el('td', { text:String(g.errors) }),
      el('td', { text:String(g.tokens) }),
      el('td', { text:fmtCost(g.cost) }),
    ]));
    if (!rows.length) rows.push(emptyRow(5, '暂无数据。'));
    const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, rows) ]);
    return el('div', {}, [
      el('h3', { text:title }),
      el('div', { class:'wrap' }, [table]),
    ]);
  }

  const windowSel = el('select', {}, STATS_WINDOWS.map(w => el('option', { value:String(w.value), text:w.label })));
  windowSel.value = String(statsState.windowMs);
  windowSel.addEventListener('change', () => {
    statsState.windowMs = Number(windowSel.value);
    refresh();
  });

  view.append(pageHead('用量', '请求量、Token 与成本的时间窗口统计。', [
    el('span', { class:'muted', text:'窗口', style:'font-size:13px' }), windowSel,
  ]));
  view.append(el('div', { class:'stat-grid' }, [
    statCard('总请求数', fmtNum(stats.totalRequests), 'activity'),
    statCard('错误率', (stats.errorRate * 100).toFixed(1) + '%', 'alertTri'),
    statCard('Token', fmtNum(stats.totalTokens), 'hash'),
    statCard('预估成本', fmtCost(stats.totalCost), 'dollar'),
  ]));

  view.append(el('h3', { text:'趋势' }));
  view.append(renderTrendChart(stats.series));

  view.append(el('h3', { text:'分布' }));
  view.append(renderDistGroup('按模型', stats.byModel, (k) => String(k)));
  view.append(renderDistGroup('按账号', stats.byAccount, nameForAccount));
  view.append(renderDistGroup('按密钥', stats.byKey, (k) => k === '(none)' ? '无 key' : nameForKey(k)));

  view.append(groupTable('按模型', stats.byModel));
  view.append(groupTable('按账号', stats.byAccount));
}

async function renderKeys(gen){
  const view = $('#view');
  view.append(skeletonTable());
  const keys = await api('/admin/gateway-keys');
  if (gen !== _renderGen) return;   // a newer render (tab switch/refresh) has superseded this one
  view.textContent = '';

  function refresh(){
    const g = ++_renderGen;
    $('#view').textContent='';
    renderKeys(g).catch(e => { if (g === _renderGen) toast(e.message, true); });
  }

  // the raw key is held only in this closure and in the modal's own input value;
  // closeModal() clears #modalBox on every dismissal path, so it never lingers in the DOM.
  function showRawKeyModal(rawKey){
    const keyInp = el('input', { class:'mono', value:rawKey, readonly:true, style:'width:100%' });
    const copyBtn = el('button', { onclick: async () => {
      try{ await navigator.clipboard.writeText(rawKey); toast('已复制'); }
      catch{ toast('复制失败 —— 请手动选中并复制', true); }
    } }, [ icon('copy'), '复制' ]);
    showModal(el('div', {}, [
      el('h3', { text:'网关密钥已创建', style:'margin:0 0 12px' }),
      el('div', { class:'row', style:'margin:0 0 10px;flex-wrap:nowrap' }, [ keyInp, copyBtn ]),
      el('p', { class:'err', style:'margin:0 0 16px', text:'仅显示一次,请立即保存,关闭后不再显示。' }),
      el('div', { class:'row', style:'margin:0;justify-content:flex-end' }, [
        el('button', { class:'primary', text:'完成', onclick: () => { closeModal(); refresh(); } }),
      ]),
    ]));
  }

  function openCreateForm(){
    const nameInp = el('input', { placeholder:'名称(可选)', style:'width:100%' });
    async function submit(){
      try{
        const res = await api('/admin/gateway-keys', { method:'POST', body: JSON.stringify({ name: nameInp.value.trim() }) });
        showRawKeyModal(res.key); await loadNameMaps();
      }catch(e){ toast(e.message, true); }
    }
    showModal(el('div', {}, [
      el('h3', { text:'新建网关密钥', style:'margin:0 0 14px' }),
      el('div', { style:'margin-bottom:10px' }, [
        el('div', { class:'muted', style:'font-size:12px;margin-bottom:3px', text:'名称' }),
        nameInp,
      ]),
      el('div', { class:'row', style:'margin:14px 0 0;justify-content:flex-end' }, [
        el('button', { text:'取消', onclick: closeModal }),
        el('button', { class:'primary', text:'创建', onclick: (e) => withBusy(e.currentTarget, submit) }),
      ]),
    ]));
  }

  view.append(pageHead('密钥', '客户端访问网关的 API 密钥。', [
    el('button', { class:'primary', onclick: openCreateForm }, [ icon('plus'), '新建密钥' ]),
  ]));

  const headRow = el('tr', {}, ['名称','密钥','状态','创建时间','操作'].map(h => el('th', { text:h })));

  const rows = keys.map(k => {
    const nameCell = el('td', { text: k.name || '—' });
    const keyCell = el('td', { class:'mono', text: k.keyHashPrefix + '…' });
    const statusCell = el('td', {}, [
      el('span', { class:'badge ' + (k.enabled ? 'b-healthy' : 'b-disabled'), text: k.enabled ? '启用' : '禁用' }),
    ]);
    const createdCell = el('td', { text: fmtTime(k.createdAt) });
    const revokeBtn = el('button', { class:'danger', text:'撤销', onclick: async () => {
      const label = k.name || k.keyHashPrefix;
      const ok = await confirmModal('撤销密钥「' + label + '」?正在使用它的客户端会立即失效。', '撤销', true);
      if (!ok) return;
      try{
        await api('/admin/gateway-keys/' + k.id, { method:'DELETE' });
        toast('密钥已撤销'); await loadNameMaps(); refresh();
      }catch(e){ toast(e.message, true); }
    }});
    const actionsCell = el('td', {}, [ revokeBtn ]);
    return el('tr', {}, [nameCell, keyCell, statusCell, createdCell, actionsCell]);
  });
  if (!rows.length){
    rows.push(emptyRow(5, '还没有网关密钥 —— 在上方创建。'));
  }

  const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, rows) ]);
  view.append(el('div', { class:'wrap' }, [table]));
}

async function renderPlayground(gen){
  const view = $('#view');
  view.append(pageHead('调试台', '直接通过账号池发送一条测试消息。'));

  const skel = el('div', { style:'max-width:560px' }, [
    col([ skelBar('25%'), skelBar('100%', 32), skelBar('25%'), skelBar('100%', 32), skelBar('25%'), skelBar('100%', 76) ], 10),
  ]);
  view.append(skel);

  function field(label, input){
    return el('div', { style:'margin-bottom:10px' }, [
      el('div', { class:'muted', style:'font-size:12px;margin-bottom:3px', text:label }),
      input,
    ]);
  }

  let models = [];
  try { models = await api('/admin/models'); } catch(e){ if (gen === _renderGen) toast(e.message, true); }
  if (gen !== _renderGen) return;   // a newer render (tab switch) has superseded this one
  skel.remove();

  const modelSel = el('select', { style:'width:100%' }, models.length
    ? models.map(m => el('option', { value:m, text:m }))
    : [ el('option', { value:'', text:'无可用模型', disabled:true }) ]);

  const protocolSel = el('select', { style:'width:100%' }, [
    el('option', { value:'openai', text:'openai' }),
    el('option', { value:'anthropic', text:'anthropic' }),
  ]);
  protocolSel.value = 'openai';

  const sessionInp = el('input', { placeholder:'可选,用于会话粘滞(x-session-id)', style:'width:100%' });
  const msgInp = el('textarea', { rows:'4', style:'width:100%' });
  msgInp.value = '你好';

  const sendLabel = el('span', { text:'发送' });
  const sendBtn = el('button', { class:'primary' }, [ icon('send'), sendLabel ]);
  const resultHolder = el('div', { style:'margin-top:16px' });

  function usageText(usage){
    usage = usage || {};
    const prompt = usage.prompt_tokens ?? usage.input_tokens;
    const completion = usage.completion_tokens ?? usage.output_tokens;
    const total = usage.total_tokens ?? (
      (prompt != null || completion != null) ? (Number(prompt||0) + Number(completion||0)) : undefined
    );
    if (total == null) return '—';
    return fmtNum(total) + (prompt != null || completion != null
      ? ' (输入 ' + fmtNum(prompt||0) + ' / 输出 ' + fmtNum(completion||0) + ')'
      : '');
  }

  function renderResult(res){
    const ok = !!res.ok;
    const cls = ok ? 'b-healthy' : 'b-exhausted';
    const label = ok ? '成功' : (res.status === 'no_candidates' ? '无可用账号' : '失败');

    const kids = [
      el('div', { class:'row', style:'margin:0 0 8px' }, [
        el('span', { class:'badge ' + cls, text:label }),
        el('span', { class:'muted', text:'命中账号: ' + nameForAccount(res.accountId) }),
      ]),
      el('div', { class:'row', style:'margin:0 0 8px' }, [
        el('span', { class:'muted', text:'HTTP: ' + (res.httpStatus ?? '—') }),
        el('span', { class:'muted', text:'延迟: ' + (res.latencyMs != null ? res.latencyMs + 'ms' : '—') }),
        el('span', { class:'muted', text:'尝试: ' + (res.attempts ?? '—') }),
        el('span', { class:'muted', text:'Token: ' + usageText(res.usage) }),
      ]),
    ];
    if (!ok){
      kids.push(el('p', { class:'err', style:'margin:0 0 8px', text: res.error || res.status || '请求失败' }));
    }
    if (res.sample){
      kids.push(el('pre', { class:'mono', style:'white-space:pre-wrap;word-break:break-all;margin:0;padding:10px;'
        + 'background:var(--bg);border:1px solid var(--line);border-radius:6px', text:res.sample }));
    }
    return el('div', { class:'card', style:'display:block;max-width:640px' }, kids);
  }

  async function submit(){
    const model = modelSel.value;
    if (!model){ toast('请选择模型', true); return; }
    const body = { model, protocol: protocolSel.value, message: msgInp.value };
    const sessionId = sessionInp.value.trim();
    if (sessionId) body.sessionId = sessionId;

    sendBtn.disabled = true;
    sendLabel.textContent = '发送中…';
    resultHolder.textContent = '';
    try{
      const res = await api('/admin/test', { method:'POST', body: JSON.stringify(body) });
      if (gen !== _renderGen) return;   // user left the tab while the request was in flight
      resultHolder.append(renderResult(res));
    }catch(e){
      if (gen === _renderGen) toast(e.message, true);
    }finally{
      if (gen === _renderGen){
        sendBtn.disabled = false;
        sendLabel.textContent = '发送';
      }
    }
  }
  sendBtn.addEventListener('click', submit);

  view.append(
    field('模型', modelSel),
    field('协议', protocolSel),
    field('会话ID', sessionInp),
    field('消息', msgInp),
  );
  view.append(el('div', { class:'row' }, [sendBtn]));
  view.append(el('p', { class:'muted', style:'font-size:12px;margin:2px 0 14px',
    text:'注意:测试请求会真实穿过账号池、并计入该账号的健康状态(失败可能触发冷却),但不写入调用日志。' }));
  view.append(resultHolder);
}

// ---- auth wiring ----
async function doLogin(){
  const key = $('#loginKey').value;
  const btn = $('#loginBtn');
  $('#loginErr').style.display='none';
  btn.disabled = true; btn.textContent = '登录中…';
  try{
    await api('/admin/login', { method:'POST', body: JSON.stringify({ key }) });
    $('#loginKey').value=''; await loadNameMaps(); showApp(); selectTab('pool');
  }catch(e){ $('#loginErr').textContent='管理员密钥错误。'; $('#loginErr').style.display='block'; }
  finally{ btn.disabled = false; btn.textContent = '登录'; }
}
$('#loginBtn').addEventListener('click', doLogin);
$('#loginKey').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
$('#themeBtn').addEventListener('click', toggleTheme);
$('#logoutBtn').addEventListener('click', async () => {
  stopAutoRefresh();
  try{ await api('/admin/logout',{method:'POST'}); }catch{}
  showLogin();
});
for (const b of document.querySelectorAll('nav [data-tab]')) b.addEventListener('click', () => selectTab(b.dataset.tab));
// inject the SVG icons declared via data-icon (nav tabs, logout)
for (const b of document.querySelectorAll('[data-icon]')) b.prepend(icon(b.dataset.icon));
$('#modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });
// Esc closes the modal too — closeModal() also wipes any one-time secret content
document.addEventListener('keydown', e => { if (e.key === 'Escape' && $('#modal').style.display === 'flex') closeModal(); });

// ---- boot ----
(async function boot(){
  try{ await api('/admin/session'); await loadNameMaps(); showApp(); selectTab('pool'); }
  catch{ showLogin(); }
})();
</script>
