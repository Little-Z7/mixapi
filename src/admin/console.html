<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mixapi 控制台</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#fff; --ink:#1b1f24; --muted:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --ok:#16a34a; --warn:#d97706; --err:#dc2626; --grey:#9ca3af; --slate:#64748b;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#0f1216; --panel:#171b21; --ink:#e6e8eb; --muted:#9aa4b2; --line:#252b33;
      --accent:#3b82f6; --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; --grey:#6b7280; --slate:#94a3b8; }
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink)}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:6px;padding:5px 10px}
  button.primary{background:var(--accent);color:#fff;border-color:transparent}
  button.danger{color:var(--err);border-color:var(--err)}
  button:disabled{opacity:.5;cursor:default}
  input,select{font:inherit;padding:6px 8px;border:1px solid var(--line);border-radius:6px;
    background:var(--panel);color:var(--ink)}
  a{color:var(--accent)}
  table{border-collapse:collapse;width:100%;background:var(--panel)}
  th,td{border-bottom:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top;font-size:13px}
  th{color:var(--muted);font-weight:600;white-space:nowrap}
  .wrap{overflow-x:auto}
  .badge{display:inline-block;padding:1px 8px;border-radius:999px;font-size:12px;color:#fff;white-space:nowrap}
  .b-healthy{background:var(--ok)} .b-cooling{background:var(--warn)} .b-exhausted{background:var(--err)}
  .b-disabled{background:var(--grey)} .b-unknown{background:var(--slate)}
  .muted{color:var(--muted)} .err{color:var(--err)} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  /* login */
  #login{max-width:360px;margin:14vh auto;padding:28px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px}
  #login h1{margin:0 0 4px;font-size:20px} #login p{margin:0 0 18px;color:var(--muted)}
  #login input{width:100%;margin-bottom:12px} #login button{width:100%}
  /* app */
  #app{display:none;min-height:100vh;grid-template-columns:200px 1fr}
  nav{background:var(--panel);border-right:1px solid var(--line);padding:16px 10px;display:flex;flex-direction:column;gap:4px}
  nav .brand{font-weight:700;padding:6px 10px 14px}
  nav button{background:transparent;border:none;text-align:left;padding:8px 10px;border-radius:6px;width:100%}
  nav button.active{background:var(--accent);color:#fff}
  nav .spacer{flex:1}
  main{padding:22px 26px;min-width:0}
  main h2{margin:0 0 14px;font-size:18px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .card{display:inline-block;min-width:150px;padding:14px 16px;margin:0 12px 12px 0;background:var(--panel);
    border:1px solid var(--line);border-radius:10px}
  .card .n{font-size:24px;font-weight:700} .card .l{color:var(--muted);font-size:12px}
  /* modal / toast */
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}
  #modal .box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;max-width:460px;width:92%}
  #toast{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:60}
  #toast div{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
    padding:10px 14px;border-radius:8px;max-width:340px}
  #toast div.err{border-left-color:var(--err)}
</style>
</head>
<body>
  <!-- LOGIN VIEW -->
  <div id="login" style="display:none">
    <h1>mixapi 控制台</h1>
    <p>输入管理员密钥以登录。</p>
    <input id="loginKey" type="password" placeholder="管理员密钥" autocomplete="off">
    <button id="loginBtn" class="primary">登录</button>
    <p id="loginErr" class="err" style="display:none;margin-top:12px"></p>
  </div>

  <!-- APP VIEW -->
  <div id="app">
    <nav>
      <div class="brand">mixapi</div>
      <button data-tab="pool" class="active">账号池</button>
      <button data-tab="logs">日志</button>
      <button data-tab="stats">用量</button>
      <button data-tab="keys">密钥</button>
      <button data-tab="playground">调试台</button>
      <div class="spacer"></div>
      <button id="logoutBtn">退出</button>
    </nav>
    <main><div id="view"></div></main>
  </div>

  <div id="modal"><div class="box" id="modalBox"></div></div>
  <div id="toast"></div>

<script>
"use strict";
const $ = (s, r=document) => r.querySelector(s);
const el = (tag, props={}, kids=[]) => {           // tiny DOM builder — NO innerHTML for data
  const n = document.createElement(tag);
  for (const k in props){
    if (k === 'class') n.className = props[k];
    else if (k === 'text') n.textContent = props[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), props[k]);
    else if (props[k] != null) n.setAttribute(k, props[k]);
  }
  for (const c of [].concat(kids)) if (c != null) n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
};

async function api(path, opts={}){
  const r = await fetch(path, {
    credentials:'same-origin',
    headers:{'content-type':'application/json'},
    ...opts,
  });
  if (r.status === 401){ showLogin(); throw new Error('unauthorized'); }
  const ct = r.headers.get('content-type') || '';
  const body = ct.includes('json') ? await r.json() : await r.text();
  if (!r.ok) throw new Error((body && body.error) || ('HTTP ' + r.status));
  return body;
}

function toast(msg, isErr){
  const t = el('div', { class: isErr ? 'err' : '', text: String(msg) });
  $('#toast').append(t);
  setTimeout(() => t.remove(), 4200);
}

// promise-based in-page confirm (NEVER window.confirm)
function confirmModal(message, confirmLabel='确认', danger=false){
  return new Promise((resolve) => {
    const box = $('#modalBox'); box.textContent='';
    box.append(el('p', { text: message, style:'margin:0 0 18px' }));
    const bar = el('div', { class:'row', style:'margin:0;justify-content:flex-end' }, [
      el('button', { text:'取消', onclick: () => { close(); resolve(false); } }),
      el('button', { text: confirmLabel, class: danger ? 'danger' : 'primary',
        onclick: () => { close(); resolve(true); } }),
    ]);
    box.append(bar);
    $('#modal').style.display='flex';
    function close(){ $('#modal').style.display='none'; }
  });
}
// show an arbitrary node in the modal (used by Keys "show once")
function showModal(node){ const b=$('#modalBox'); b.textContent=''; b.append(node); $('#modal').style.display='flex'; }
// hides the overlay AND clears modalBox — required so sensitive one-time content
// (e.g. a freshly created gateway key) never lingers in the hidden DOM after dismissal.
function closeModal(){ $('#modal').style.display='none'; $('#modalBox').textContent=''; }

// ---- formatting helpers ----
const fmtTime = (ms) => ms ? new Date(ms).toLocaleString() : '—';
const fmtCost = (n) => '$' + (Number(n)||0).toFixed(4);
const fmtNum  = (n) => (Number(n)||0).toLocaleString();
const cooldownLeft = (until) => {
  if (!until) return '—';
  const s = Math.max(0, Math.round((until - Date.now())/1000));
  return s ? (s>=60 ? Math.floor(s/60)+'m'+(s%60)+'s' : s+'s') : '—';
};

// ---- view switching ----
function showLogin(){ $('#app').style.display='none'; $('#login').style.display='block'; $('#loginKey').focus(); }
function showApp(){ $('#login').style.display='none'; $('#app').style.display='grid'; }

// ---- shared name maps (account/key id -> display name), used across tabs ----
let ACCOUNTS = [];
let KEYS = [];
async function loadNameMaps(){
  try { ACCOUNTS = await api('/admin/accounts'); KEYS = await api('/admin/gateway-keys'); } catch {}
}
function nameForAccount(id){
  if (id === null || id === undefined) return '—';
  const a = ACCOUNTS.find(x => x.id === id);
  if (a && a.name) return a.name;
  return String(id).slice(0, 8) + '…';
}
function nameForKey(id){
  if (id === null || id === undefined) return '(none)';
  const k = KEYS.find(x => x.id === id);
  if (k && k.name) return k.name;
  if (k && k.keyHashPrefix) return k.keyHashPrefix + '…';
  return String(id).slice(0, 8) + '…';
}

// ---- shared auto-refresh manager (single timer; stopped on tab switch/logout) ----
let _timer = null;
function startAutoRefresh(fn, ms){ stopAutoRefresh(); _timer = setInterval(fn, ms); }
function stopAutoRefresh(){ if (_timer){ clearInterval(_timer); _timer = null; } }

const RENDERERS = { pool: renderPool, logs: renderLogs, stats: renderStats, keys: renderKeys, playground: renderPlayground };
function selectTab(name){
  stopAutoRefresh();
  for (const b of document.querySelectorAll('nav [data-tab]')) b.classList.toggle('active', b.dataset.tab===name);
  $('#view').textContent = '';
  RENDERERS[name]().catch(e => toast(e.message, true));
}

// ---- STUBS (replaced in Tasks 2 & 3) ----
function parseModels(text){
  return String(text||'').split(/[\n,]/).map(s=>s.trim()).filter(Boolean).map(tok=>{
    const i = tok.indexOf(':');                          // split on FIRST colon only —
    const pub = (i === -1 ? tok : tok.slice(0, i)).trim(); // target IDs may contain colons (e.g. llama3:8b)
    const tgt = (i === -1 ? '' : tok.slice(i + 1)).trim();
    return { public: pub, target: tgt || pub };
  });
}
function modelsToText(models){ return (models||[]).map(m => m.public===m.target ? m.public : m.public+':'+m.target).join('\n'); }

const ACCOUNT_STATUS_LABELS = { healthy:'健康', cooling:'冷却中', exhausted:'耗尽', disabled:'禁用', unknown:'未知' };

let poolAutoRefresh = false;  // preserved across auto-triggered re-renders of the Pool tab

async function renderPool(){
  const accounts = await api('/admin/accounts');
  const view = $('#view');

  function field(label, input){
    return el('div', { style:'margin-bottom:10px' }, [
      el('div', { class:'muted', style:'font-size:12px;margin-bottom:3px', text:label }),
      input,
    ]);
  }

  function refresh(){ $('#view').textContent=''; renderPool().catch(e => toast(e.message, true)); }

  function openEditForm(a){
    const baseUrlInp = el('input', { value:a.baseUrl, style:'width:100%' });
    const modelsInp = el('textarea', { rows:'3', style:'width:100%' });
    modelsInp.value = modelsToText(a.models);
    const weightInp = el('input', { type:'number', value:String(a.weight), style:'width:100%' });
    const egressInp = el('input', { value: a.egress || '', placeholder:'可选:出口标识/代理', style:'width:100%' });
    const keyInp = el('input', { type:'password', placeholder:'留空则保留当前密钥', autocomplete:'new-password', style:'width:100%' });

    async function submit(){
      const body = {
        baseUrl: baseUrlInp.value.trim(),
        models: parseModels(modelsInp.value),
        weight: weightInp.value === '' ? a.weight : Number(weightInp.value),
        egress: egressInp.value.trim() || null,
      };
      const key = keyInp.value.trim();
      if (key) body.key = key;
      try{
        await api('/admin/accounts/' + a.id, { method:'PATCH', body: JSON.stringify(body) });
        closeModal(); toast('账号已更新'); await loadNameMaps(); refresh();
      }catch(e){ toast(e.message, true); }
    }

    showModal(el('div', {}, [
      el('h3', { text:'编辑 ' + a.name, style:'margin:0 0 14px' }),
      field('基础 URL', baseUrlInp),
      field('模型(每行一个 public:target)', modelsInp),
      field('权重', weightInp),
      field('出口/egress', egressInp),
      field('密钥', keyInp),
      el('div', { class:'row', style:'margin:14px 0 0;justify-content:flex-end' }, [
        el('button', { text:'取消', onclick: closeModal }),
        el('button', { class:'primary', text:'保存', onclick: submit }),
      ]),
    ]));
  }

  function buildAddForm(){
    const nameInp = el('input', { placeholder:'名称', style:'width:100%' });
    const providerInp = el('input', { value:'custom', style:'width:100%' });
    const adapterInp = el('input', { placeholder:'openai / anthropic', style:'width:100%' });
    const baseUrlInp = el('input', { placeholder:'https://api.example.com/v1', style:'width:100%' });
    const modelsInp = el('textarea', { rows:'3', placeholder:'每行一个 public:target(只写 model 表示两者相同)', style:'width:100%' });
    const weightInp = el('input', { type:'number', value:'1', style:'width:100%' });
    const egressInp = el('input', { placeholder:'可选:出口标识/代理', style:'width:100%' });
    const keyInp = el('input', { type:'password', placeholder:'上游 API 密钥', autocomplete:'new-password', style:'width:100%' });

    async function submit(){
      const body = {
        name: nameInp.value.trim(),
        provider: providerInp.value.trim() || 'custom',
        adapter: adapterInp.value.trim(),
        baseUrl: baseUrlInp.value.trim(),
        models: parseModels(modelsInp.value),
        weight: weightInp.value === '' ? 1 : Number(weightInp.value),
        key: keyInp.value.trim(),
      };
      const egress = egressInp.value.trim();
      if (egress) body.egress = egress;
      if (!body.name || !body.adapter || !body.baseUrl || !body.key){
        toast('名称、适配器、基础 URL、密钥均为必填项', true); return;
      }
      try{
        await api('/admin/accounts', { method:'POST', body: JSON.stringify(body) });
        toast('账号已创建'); await loadNameMaps(); refresh();
      }catch(e){ toast(e.message, true); }
    }

    const wrap = el('div', { class:'card', style:'display:none;max-width:560px' });
    wrap.append(
      el('div', { style:'font-weight:600;margin-bottom:10px', text:'添加账号' }),
      field('名称', nameInp),
      field('提供商', providerInp),
      field('适配器', adapterInp),
      field('基础 URL', baseUrlInp),
      field('模型(每行一个 public:target)', modelsInp),
      field('权重', weightInp),
      field('出口/egress', egressInp),
      field('密钥', keyInp),
      el('div', { class:'row', style:'margin:4px 0 0' }, [
        el('button', { class:'primary', text:'创建账号', onclick: submit }),
        el('button', { text:'取消', onclick: () => { wrap.style.display='none'; } }),
      ]),
    );
    return wrap;
  }

  const addForm = buildAddForm();
  const addToggleBtn = el('button', { class:'primary', text:'＋ 添加账号', onclick: () => {
    addForm.style.display = addForm.style.display === 'none' ? 'block' : 'none';
  }});

  const autoRefreshLabel = el('label', { class:'row', style:'margin:0;gap:6px;cursor:pointer' });
  const autoRefreshCheckbox = el('input', { type:'checkbox' });
  autoRefreshCheckbox.checked = poolAutoRefresh;
  autoRefreshCheckbox.addEventListener('change', () => {
    poolAutoRefresh = autoRefreshCheckbox.checked;
    if (poolAutoRefresh) startAutoRefresh(refresh, 10000);
    else stopAutoRefresh();
  });
  autoRefreshLabel.append(autoRefreshCheckbox, el('span', { class:'muted', text:'自动刷新' }));
  if (poolAutoRefresh) startAutoRefresh(refresh, 10000);

  view.append(el('div', { class:'row', style:'justify-content:space-between' }, [
    el('h2', { text:'账号池', style:'margin:0' }),
    el('div', { class:'row', style:'margin:0' }, [ autoRefreshLabel, addToggleBtn ]),
  ]));
  view.append(addForm);

  const headRow = el('tr', {}, ['名称','适配器','模型','状态','冷却','错误','最近使用','权重','操作']
    .map(h => el('th', { text:h })));

  const rows = accounts.map(a => {
    const nameCell = el('td', {}, [
      el('div', { text:a.name }),
      el('div', { class:'muted', text:a.provider }),
    ]);
    const adapterCell = el('td', { text:a.adapter });
    const modelsCell = el('td', {}, a.models.length
      ? a.models.map(m => el('div', { text:m.public + ' → ' + m.target }))
      : [ el('span', { class:'muted', text:'—' }) ]);
    const statusCell = el('td', {}, [ el('span', { class:'badge b-' + a.state.status, text: ACCOUNT_STATUS_LABELS[a.state.status] || a.state.status }) ]);
    const cooldownCell = el('td', { text: cooldownLeft(a.state.cooldownUntil) });

    const errKids = [ el('div', { text:String(a.state.consecutiveErrors) }) ];
    if (a.state.lastError){
      const full = a.state.lastError;
      const short = full.length > 60 ? full.slice(0, 60) + '…' : full;
      errKids.push(el('div', { class:'muted err', text:short, title:full }));
    }
    const errCell = el('td', {}, errKids);
    const lastUsedCell = el('td', { text: fmtTime(a.state.lastUsedAt) });
    const weightCell = el('td', { text:String(a.weight) });

    const enableBtn = el('button', { text: a.enabled ? '禁用' : '启用', onclick: async () => {
      try{
        await api('/admin/accounts/' + a.id, { method:'PATCH', body: JSON.stringify({ enabled: !a.enabled }) });
        toast(a.enabled ? '账号已禁用' : '账号已启用'); refresh();
      }catch(e){ toast(e.message, true); }
    }});
    const resetBtn = el('button', { text:'重置冷却', onclick: async () => {
      try{
        await api('/admin/accounts/' + a.id + '/reset-cooldown', { method:'POST' });
        toast('冷却已重置'); refresh();
      }catch(e){ toast(e.message, true); }
    }});
    const editBtn = el('button', { text:'编辑', onclick: () => openEditForm(a) });
    const delBtn = el('button', { class:'danger', text:'删除', onclick: async () => {
      const ok = await confirmModal('删除账号「' + a.name + '」?将一并移除其凭证与健康状态。', '删除', true);
      if (!ok) return;
      try{
        await api('/admin/accounts/' + a.id, { method:'DELETE' });
        toast('账号已删除'); refresh();
      }catch(e){ toast(e.message, true); }
    }});
    const actionsCell = el('td', {}, [
      el('div', { class:'row', style:'margin:0;flex-wrap:nowrap' }, [enableBtn, resetBtn, editBtn, delBtn]),
    ]);

    return el('tr', {}, [nameCell, adapterCell, modelsCell, statusCell, cooldownCell, errCell, lastUsedCell, weightCell, actionsCell]);
  });

  if (!rows.length){
    rows.push(el('tr', {}, [ el('td', { class:'muted', colspan:'9', text:'还没有账号 —— 在上方添加。' }) ]));
  }

  const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, rows) ]);
  view.append(el('div', { class:'wrap' }, [table]));
}
// null-safe cell text: request_logs columns besides id/ts/status are all nullable
function orDash(v, suffix=''){ return (v === null || v === undefined) ? '—' : (v + suffix); }

const logsState = { model:'', account:'', status:'', windowMs:0, q:'', limit:'100', offset:0 };
const LOG_STATUS_LABELS = { ok:'成功', error:'失败' };
const LOG_WINDOWS = [
  { label:'近 1 小时', value: 3600e3 },
  { label:'近 24 小时', value: 86400e3 },
  { label:'近 7 天', value: 7 * 86400e3 },
  { label:'全部', value: 0 },
];
const LOG_LIMITS = [25, 50, 100, 200];

// escape a single CSV field: wrap in quotes (doubling inner quotes) if it
// contains a comma, quote, or newline.
function csvField(v){
  let s = String(v == null ? '' : v);
  // CSV formula-injection guard: a cell a spreadsheet would evaluate as a formula
  // (leading = + - @ tab CR — reachable via a client-chosen model/account name)
  // is neutralized by prefixing a single quote so it's treated as text.
  if (/^[=+\-@\t\r]/.test(s)) s = "'" + s;
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function logsToCsv(rows){
  const header = ['时间','模型','账号','状态','HTTP','延迟ms','尝试','tokens','成本'];
  const lines = [header.map(csvField).join(',')];
  for (const r of rows){
    lines.push([
      r.ts ? new Date(r.ts).toISOString() : '',
      r.public_model ?? '',
      nameForAccount(r.account_id),
      LOG_STATUS_LABELS[r.status] || r.status || '',
      r.http_status ?? '',
      r.latency_ms ?? '',
      r.attempt_count ?? '',
      r.total_tokens ?? '',
      r.est_cost ?? '',
    ].map(csvField).join(','));
  }
  return lines.join('\n');
}
function downloadCsv(filename, csv){
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = el('a', { href:url, download:filename });
  document.body.append(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function renderLogs(){
  const params = new URLSearchParams();
  if (logsState.model) params.set('model', logsState.model);
  if (logsState.account) params.set('account', logsState.account);
  if (logsState.status) params.set('status', logsState.status);
  if (logsState.windowMs) params.set('sinceMs', String(Date.now() - logsState.windowMs));
  if (logsState.q) params.set('q', logsState.q);
  if (logsState.limit) params.set('limit', logsState.limit);
  if (logsState.offset) params.set('offset', String(logsState.offset));
  const qs = params.toString();
  const page = await api('/admin/logs' + (qs ? '?' + qs : ''));
  const rows = page.rows || [];
  const total = page.total || 0;
  const limitNum = Math.max(1, Number(logsState.limit) || 100);

  const view = $('#view');

  function refresh(){ $('#view').textContent=''; renderLogs().catch(e => toast(e.message, true)); }

  const modelInp = el('input', { placeholder:'例如 gpt-4o', value: logsState.model, style:'width:150px' });
  const accountInp = el('input', { placeholder:'账号 ID', value: logsState.account, style:'width:170px' });
  const statusSel = el('select', {}, [
    el('option', { value:'', text:'全部' }),
    el('option', { value:'ok', text:'成功' }),
    el('option', { value:'error', text:'失败' }),
  ]);
  statusSel.value = logsState.status;
  const windowSel = el('select', {}, LOG_WINDOWS.map(w => el('option', { value:String(w.value), text:w.label })));
  windowSel.value = String(logsState.windowMs);
  const qInp = el('input', { placeholder:'关键词', value: logsState.q, style:'width:150px' });
  const limitSel = el('select', {}, LOG_LIMITS.map(n => el('option', { value:String(n), text:String(n) })));
  limitSel.value = String(limitNum);

  function apply(){
    logsState.model = modelInp.value.trim();
    logsState.account = accountInp.value.trim();
    logsState.status = statusSel.value;
    logsState.windowMs = Number(windowSel.value) || 0;
    logsState.q = qInp.value.trim();
    logsState.limit = limitSel.value;
    logsState.offset = 0;               // any filter change resets pagination
    refresh();
  }

  view.append(el('h2', { text:'日志' }));
  view.append(el('div', { class:'row' }, [
    el('span', { class:'muted', text:'模型' }), modelInp,
    el('span', { class:'muted', text:'账号' }), accountInp,
    el('span', { class:'muted', text:'状态' }), statusSel,
    el('span', { class:'muted', text:'时间范围' }), windowSel,
    el('span', { class:'muted', text:'关键词' }), qInp,
    el('span', { class:'muted', text:'条数' }), limitSel,
    el('button', { class:'primary', text:'查询', onclick: apply }),
    el('button', { text:'刷新', onclick: refresh }),
    el('button', { text:'导出 CSV', onclick: () => downloadCsv('mixapi-logs.csv', logsToCsv(rows)) }),
  ]));

  const headRow = el('tr', {}, ['时间','模型','账号','状态','HTTP','延迟','尝试','Token','成本']
    .map(h => el('th', { text:h })));

  const bodyRows = rows.map(r => {
    const cls = r.status === 'ok' ? 'b-healthy' : r.status === 'error' ? 'b-exhausted' : 'b-unknown';
    return el('tr', {}, [
      el('td', { text: fmtTime(r.ts) }),
      el('td', { text: orDash(r.public_model) }),
      el('td', { text: nameForAccount(r.account_id) }),
      el('td', {}, [ el('span', { class:'badge ' + cls, text: LOG_STATUS_LABELS[r.status] || r.status }) ]),
      el('td', { text: orDash(r.http_status) }),
      el('td', { text: orDash(r.latency_ms, 'ms') }),
      el('td', { text: orDash(r.attempt_count) }),
      el('td', { text: orDash(r.total_tokens) }),
      el('td', { text: fmtCost(r.est_cost) }),
    ]);
  });
  if (!bodyRows.length){
    bodyRows.push(el('tr', {}, [ el('td', { class:'muted', colspan:'9', text:'没有符合条件的日志。' }) ]));
  }

  const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, bodyRows) ]);
  view.append(el('div', { class:'wrap' }, [table]));

  const atStart = logsState.offset <= 0;
  const atEnd = logsState.offset + rows.length >= total;
  const rangeLabel = total > 0
    ? `第 ${logsState.offset + 1}–${logsState.offset + rows.length} / 共 ${total} 条`
    : '共 0 条';
  view.append(el('div', { class:'row' }, [
    el('button', { text:'上一页', disabled: atStart || null, onclick: () => {
      logsState.offset = Math.max(0, logsState.offset - limitNum);
      refresh();
    } }),
    el('button', { text:'下一页', disabled: atEnd || null, onclick: () => {
      logsState.offset = Math.min(logsState.offset + limitNum, Math.max(0, total - 1));
      refresh();
    } }),
    el('span', { class:'muted', text: rangeLabel }),
  ]));
}

const STATS_WINDOWS = [
  { label:'最近 1 小时', value: 3600e3 },
  { label:'最近 24 小时', value: 86400e3 },
  { label:'最近 7 天', value: 7 * 86400e3 },
  { label:'全部时间', value: 0 },
];
const statsState = { windowMs: 86400e3 };  // default: Last 24h

// ---- tiny SVG helpers (no library; theme colors pulled from CSS vars at render time) ----
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs={}){
  const n = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) if (attrs[k] != null) n.setAttribute(k, attrs[k]);
  return n;
}
function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

// grouped-bar trend chart: requests + errors per bucket, over time
function renderTrendChart(series){
  if (!series || !series.length){
    return el('p', { class:'muted', text:'暂无数据' });
  }
  const accent = cssVar('--accent'), err = cssVar('--err'), line = cssVar('--line'), muted = cssVar('--muted');
  const W = 720, H = 220, padL = 40, padR = 12, padT = 12, padB = 28;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const maxV = Math.max(1, ...series.map(p => Math.max(p.requests, p.errors)));
  const n = series.length;
  const groupW = innerW / n;
  const barW = Math.max(1, Math.min(14, groupW * 0.36));

  const svg = svgEl('svg', { viewBox: `0 0 ${W} ${H}`, style:'width:100%;height:auto;display:block' });

  // axis line
  svg.append(svgEl('line', { x1:padL, y1:padT+innerH, x2:padL+innerW, y2:padT+innerH, stroke:line, 'stroke-width':1 }));

  series.forEach((p, i) => {
    const cx = padL + groupW * (i + 0.5);
    const rH = (p.requests / maxV) * innerH;
    const eH = (p.errors / maxV) * innerH;
    svg.append(svgEl('rect', {
      x: cx - barW - 1, y: padT + innerH - rH, width: barW, height: Math.max(0, rH), fill: accent,
    }));
    svg.append(svgEl('rect', {
      x: cx + 1, y: padT + innerH - eH, width: barW, height: Math.max(0, eH), fill: err,
    }));
  });

  // a handful of x-axis time ticks
  const tickCount = Math.min(6, n);
  for (let t = 0; t < tickCount; t++){
    const idx = tickCount === 1 ? 0 : Math.round(t * (n - 1) / (tickCount - 1));
    const cx = padL + groupW * (idx + 0.5);
    const label = new Date(series[idx].bucket).toLocaleString(undefined,
      { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    const txt = svgEl('text', { x:cx, y:H-8, 'text-anchor':'middle', 'font-size':'10', fill:muted });
    txt.textContent = label;
    svg.append(txt);
  }

  const legend = el('div', { class:'row', style:'margin:6px 0 0;gap:16px' }, [
    el('span', { style:`font-size:12px;color:${accent}`, text:'■ 请求' }),
    el('span', { style:`font-size:12px;color:${err}`, text:'■ 错误' }),
  ]);

  return el('div', {}, [ el('div', { class:'wrap' }, [svg]), legend ]);
}

// horizontal-bar distribution group: one row per entry, bar scaled to the group max
function renderDistGroup(title, groups, nameFor){
  const body = [];
  if (!groups || !groups.length){
    body.push(el('p', { class:'muted', text:'暂无数据' }));
  } else {
    const accent = cssVar('--accent'), line = cssVar('--line'), ink = cssVar('--ink');
    const maxV = Math.max(1, ...groups.map(g => g.requests));
    const W = 640, rowH = 24, H = rowH * groups.length;
    const labelW = 160, padR = 60;
    const barMaxW = W - labelW - padR;
    const svg = svgEl('svg', { viewBox:`0 0 ${W} ${H}`, style:'width:100%;height:auto;display:block' });
    groups.forEach((g, i) => {
      const y = i * rowH;
      const name = nameFor ? nameFor(g.key) : String(g.key);
      const w = (g.requests / maxV) * barMaxW;
      const label = svgEl('text', { x:0, y:y+rowH/2+4, 'font-size':'12', fill:ink });
      label.textContent = name.length > 20 ? name.slice(0, 20) + '…' : name;
      svg.append(label);
      svg.append(svgEl('rect', { x:labelW, y:y+4, width:barMaxW, height:rowH-10, fill:'none', stroke:line }));
      svg.append(svgEl('rect', { x:labelW, y:y+4, width:Math.max(0, w), height:rowH-10, fill:accent }));
      const val = svgEl('text', { x:labelW+barMaxW+8, y:y+rowH/2+4, 'font-size':'12', fill:ink });
      val.textContent = fmtNum(g.requests);
      svg.append(val);
    });
    body.push(el('div', { class:'wrap' }, [svg]));
  }
  return el('div', {}, [
    el('h4', { text:title, style:'margin:10px 0 6px;font-size:13px;color:var(--muted)' }),
    ...body,
  ]);
}

async function renderStats(){
  const sinceMs = statsState.windowMs === 0 ? 0 : Date.now() - statsState.windowMs;
  const stats = await api('/admin/stats?sinceMs=' + sinceMs);

  const view = $('#view');

  function statCard(label, value){
    return el('div', { class:'card' }, [
      el('div', { class:'n', text:String(value) }),
      el('div', { class:'l', text:label }),
    ]);
  }
  function groupTable(title, groups){
    const headRow = el('tr', {}, ['键','请求','错误','Token','成本'].map(h => el('th', { text:h })));
    const rows = (groups || []).map(g => el('tr', {}, [
      el('td', { text:String(g.key) }),
      el('td', { text:String(g.requests) }),
      el('td', { text:String(g.errors) }),
      el('td', { text:String(g.tokens) }),
      el('td', { text:fmtCost(g.cost) }),
    ]));
    if (!rows.length) rows.push(el('tr', {}, [ el('td', { class:'muted', colspan:'5', text:'暂无数据。' }) ]));
    const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, rows) ]);
    return el('div', {}, [
      el('h3', { text:title, style:'margin:20px 0 8px;font-size:15px' }),
      el('div', { class:'wrap' }, [table]),
    ]);
  }

  const windowSel = el('select', {}, STATS_WINDOWS.map(w => el('option', { value:String(w.value), text:w.label })));
  windowSel.value = String(statsState.windowMs);
  windowSel.addEventListener('change', () => {
    statsState.windowMs = Number(windowSel.value);
    $('#view').textContent = '';
    renderStats().catch(e => toast(e.message, true));
  });

  view.append(el('h2', { text:'用量' }));
  view.append(el('div', { class:'row' }, [ el('span', { class:'muted', text:'窗口' }), windowSel ]));
  view.append(el('div', { class:'row' }, [
    statCard('总请求数', stats.totalRequests),
    statCard('错误率', (stats.errorRate * 100).toFixed(1) + '%'),
    statCard('Token', fmtNum(stats.totalTokens)),
    statCard('预估成本', fmtCost(stats.totalCost)),
  ]));

  view.append(el('h3', { text:'趋势', style:'margin:20px 0 8px;font-size:15px' }));
  view.append(renderTrendChart(stats.series));

  view.append(el('h3', { text:'分布', style:'margin:20px 0 8px;font-size:15px' }));
  view.append(renderDistGroup('按模型', stats.byModel, (k) => String(k)));
  view.append(renderDistGroup('按账号', stats.byAccount, nameForAccount));
  view.append(renderDistGroup('按密钥', stats.byKey, (k) => k === '(none)' ? '无 key' : nameForKey(k)));

  view.append(groupTable('按模型', stats.byModel));
  view.append(groupTable('按账号', stats.byAccount));
}

async function renderKeys(){
  const keys = await api('/admin/gateway-keys');
  const view = $('#view');

  function refresh(){ $('#view').textContent=''; renderKeys().catch(e => toast(e.message, true)); }

  // the raw key is held only in this closure and in the modal's own input value;
  // closeModal() clears #modalBox on every dismissal path, so it never lingers in the DOM.
  function showRawKeyModal(rawKey){
    const keyInp = el('input', { class:'mono', value:rawKey, readonly:true, style:'width:100%' });
    const copyBtn = el('button', { text:'复制', onclick: async () => {
      try{ await navigator.clipboard.writeText(rawKey); toast('已复制'); }
      catch{ toast('复制失败 —— 请手动选中并复制', true); }
    }});
    showModal(el('div', {}, [
      el('h3', { text:'网关密钥已创建', style:'margin:0 0 12px' }),
      el('div', { class:'row', style:'margin:0 0 10px;flex-wrap:nowrap' }, [ keyInp, copyBtn ]),
      el('p', { class:'err', style:'margin:0 0 16px', text:'仅显示一次,请立即保存,关闭后不再显示。' }),
      el('div', { class:'row', style:'margin:0;justify-content:flex-end' }, [
        el('button', { class:'primary', text:'完成', onclick: () => { closeModal(); refresh(); } }),
      ]),
    ]));
  }

  function openCreateForm(){
    const nameInp = el('input', { placeholder:'名称(可选)', style:'width:100%' });
    async function submit(){
      try{
        const res = await api('/admin/gateway-keys', { method:'POST', body: JSON.stringify({ name: nameInp.value.trim() }) });
        showRawKeyModal(res.key);
      }catch(e){ toast(e.message, true); }
    }
    showModal(el('div', {}, [
      el('h3', { text:'新建网关密钥', style:'margin:0 0 14px' }),
      el('div', { style:'margin-bottom:10px' }, [
        el('div', { class:'muted', style:'font-size:12px;margin-bottom:3px', text:'名称' }),
        nameInp,
      ]),
      el('div', { class:'row', style:'margin:14px 0 0;justify-content:flex-end' }, [
        el('button', { text:'取消', onclick: closeModal }),
        el('button', { class:'primary', text:'创建', onclick: submit }),
      ]),
    ]));
  }

  view.append(el('div', { class:'row', style:'justify-content:space-between' }, [
    el('h2', { text:'密钥', style:'margin:0' }),
    el('button', { class:'primary', text:'＋ 新建密钥', onclick: openCreateForm }),
  ]));

  const headRow = el('tr', {}, ['名称','密钥','状态','创建时间','操作'].map(h => el('th', { text:h })));

  const rows = keys.map(k => {
    const nameCell = el('td', { text: k.name || '—' });
    const keyCell = el('td', { class:'mono', text: k.keyHashPrefix + '…' });
    const statusCell = el('td', {}, [
      el('span', { class:'badge ' + (k.enabled ? 'b-healthy' : 'b-disabled'), text: k.enabled ? '启用' : '禁用' }),
    ]);
    const createdCell = el('td', { text: fmtTime(k.createdAt) });
    const revokeBtn = el('button', { class:'danger', text:'撤销', onclick: async () => {
      const label = k.name || k.keyHashPrefix;
      const ok = await confirmModal('撤销密钥「' + label + '」?正在使用它的客户端会立即失效。', '撤销', true);
      if (!ok) return;
      try{
        await api('/admin/gateway-keys/' + k.id, { method:'DELETE' });
        toast('密钥已撤销'); refresh();
      }catch(e){ toast(e.message, true); }
    }});
    const actionsCell = el('td', {}, [ revokeBtn ]);
    return el('tr', {}, [nameCell, keyCell, statusCell, createdCell, actionsCell]);
  });
  if (!rows.length){
    rows.push(el('tr', {}, [ el('td', { class:'muted', colspan:'5', text:'还没有网关密钥 —— 在上方创建。' }) ]));
  }

  const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, rows) ]);
  view.append(el('div', { class:'wrap' }, [table]));
}

async function renderPlayground(){
  const view = $('#view');
  view.append(el('h2', { text:'调试台' }));

  function field(label, input){
    return el('div', { style:'margin-bottom:10px' }, [
      el('div', { class:'muted', style:'font-size:12px;margin-bottom:3px', text:label }),
      input,
    ]);
  }

  let models = [];
  try { models = await api('/admin/models'); } catch(e){ toast(e.message, true); }

  const modelSel = el('select', { style:'width:100%' }, models.length
    ? models.map(m => el('option', { value:m, text:m }))
    : [ el('option', { value:'', text:'无可用模型', disabled:true }) ]);

  const protocolSel = el('select', { style:'width:100%' }, [
    el('option', { value:'openai', text:'openai' }),
    el('option', { value:'anthropic', text:'anthropic' }),
  ]);
  protocolSel.value = 'openai';

  const sessionInp = el('input', { placeholder:'可选,用于会话粘滞(x-session-id)', style:'width:100%' });
  const msgInp = el('textarea', { rows:'4', style:'width:100%' });
  msgInp.value = '你好';

  const sendBtn = el('button', { class:'primary', text:'发送' });
  const resultHolder = el('div', { style:'margin-top:16px' });

  function usageText(usage){
    usage = usage || {};
    const prompt = usage.prompt_tokens ?? usage.input_tokens;
    const completion = usage.completion_tokens ?? usage.output_tokens;
    const total = usage.total_tokens ?? (
      (prompt != null || completion != null) ? (Number(prompt||0) + Number(completion||0)) : undefined
    );
    if (total == null) return '—';
    return fmtNum(total) + (prompt != null || completion != null
      ? ' (输入 ' + fmtNum(prompt||0) + ' / 输出 ' + fmtNum(completion||0) + ')'
      : '');
  }

  function renderResult(res){
    const ok = !!res.ok;
    const cls = ok ? 'b-healthy' : 'b-exhausted';
    const label = ok ? '成功' : (res.status === 'no_candidates' ? '无可用账号' : '失败');

    const kids = [
      el('div', { class:'row', style:'margin:0 0 8px' }, [
        el('span', { class:'badge ' + cls, text:label }),
        el('span', { class:'muted', text:'命中账号: ' + nameForAccount(res.accountId) }),
      ]),
      el('div', { class:'row', style:'margin:0 0 8px' }, [
        el('span', { class:'muted', text:'HTTP: ' + (res.httpStatus ?? '—') }),
        el('span', { class:'muted', text:'延迟: ' + (res.latencyMs != null ? res.latencyMs + 'ms' : '—') }),
        el('span', { class:'muted', text:'尝试: ' + (res.attempts ?? '—') }),
        el('span', { class:'muted', text:'Token: ' + usageText(res.usage) }),
      ]),
    ];
    if (!ok){
      kids.push(el('p', { class:'err', style:'margin:0 0 8px', text: res.error || res.status || '请求失败' }));
    }
    if (res.sample){
      kids.push(el('pre', { class:'mono', style:'white-space:pre-wrap;word-break:break-all;margin:0;padding:10px;'
        + 'background:var(--bg);border:1px solid var(--line);border-radius:6px', text:res.sample }));
    }
    return el('div', { class:'card', style:'display:block;max-width:640px' }, kids);
  }

  async function submit(){
    const model = modelSel.value;
    if (!model){ toast('请选择模型', true); return; }
    const body = { model, protocol: protocolSel.value, message: msgInp.value };
    const sessionId = sessionInp.value.trim();
    if (sessionId) body.sessionId = sessionId;

    sendBtn.disabled = true;
    sendBtn.textContent = '发送中…';
    resultHolder.textContent = '';
    try{
      const res = await api('/admin/test', { method:'POST', body: JSON.stringify(body) });
      resultHolder.append(renderResult(res));
    }catch(e){
      toast(e.message, true);
    }finally{
      sendBtn.disabled = false;
      sendBtn.textContent = '发送';
    }
  }
  sendBtn.addEventListener('click', submit);

  view.append(
    field('模型', modelSel),
    field('协议', protocolSel),
    field('会话ID', sessionInp),
    field('消息', msgInp),
  );
  view.append(el('div', { class:'row' }, [sendBtn]));
  view.append(resultHolder);
}

// ---- auth wiring ----
async function doLogin(){
  const key = $('#loginKey').value;
  $('#loginErr').style.display='none';
  try{
    await api('/admin/login', { method:'POST', body: JSON.stringify({ key }) });
    $('#loginKey').value=''; await loadNameMaps(); showApp(); selectTab('pool');
  }catch(e){ $('#loginErr').textContent='管理员密钥错误。'; $('#loginErr').style.display='block'; }
}
$('#loginBtn').addEventListener('click', doLogin);
$('#loginKey').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
$('#logoutBtn').addEventListener('click', async () => {
  stopAutoRefresh();
  try{ await api('/admin/logout',{method:'POST'}); }catch{}
  showLogin();
});
for (const b of document.querySelectorAll('nav [data-tab]')) b.addEventListener('click', () => selectTab(b.dataset.tab));
$('#modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });

// ---- boot ----
(async function boot(){
  try{ await api('/admin/session'); await loadNameMaps(); showApp(); selectTab('pool'); }
  catch{ showLogin(); }
})();
</script>
