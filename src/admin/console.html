<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mixapi admin</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#fff; --ink:#1b1f24; --muted:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --ok:#16a34a; --warn:#d97706; --err:#dc2626; --grey:#9ca3af; --slate:#64748b;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#0f1216; --panel:#171b21; --ink:#e6e8eb; --muted:#9aa4b2; --line:#252b33;
      --accent:#3b82f6; --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; --grey:#6b7280; --slate:#94a3b8; }
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink)}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:6px;padding:5px 10px}
  button.primary{background:var(--accent);color:#fff;border-color:transparent}
  button.danger{color:var(--err);border-color:var(--err)}
  button:disabled{opacity:.5;cursor:default}
  input,select{font:inherit;padding:6px 8px;border:1px solid var(--line);border-radius:6px;
    background:var(--panel);color:var(--ink)}
  a{color:var(--accent)}
  table{border-collapse:collapse;width:100%;background:var(--panel)}
  th,td{border-bottom:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top;font-size:13px}
  th{color:var(--muted);font-weight:600;white-space:nowrap}
  .wrap{overflow-x:auto}
  .badge{display:inline-block;padding:1px 8px;border-radius:999px;font-size:12px;color:#fff}
  .b-healthy{background:var(--ok)} .b-cooling{background:var(--warn)} .b-exhausted{background:var(--err)}
  .b-disabled{background:var(--grey)} .b-unknown{background:var(--slate)}
  .muted{color:var(--muted)} .err{color:var(--err)} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  /* login */
  #login{max-width:360px;margin:14vh auto;padding:28px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px}
  #login h1{margin:0 0 4px;font-size:20px} #login p{margin:0 0 18px;color:var(--muted)}
  #login input{width:100%;margin-bottom:12px} #login button{width:100%}
  /* app */
  #app{display:none;min-height:100vh;grid-template-columns:200px 1fr}
  nav{background:var(--panel);border-right:1px solid var(--line);padding:16px 10px;display:flex;flex-direction:column;gap:4px}
  nav .brand{font-weight:700;padding:6px 10px 14px}
  nav button{background:transparent;border:none;text-align:left;padding:8px 10px;border-radius:6px;width:100%}
  nav button.active{background:var(--accent);color:#fff}
  nav .spacer{flex:1}
  main{padding:22px 26px;min-width:0}
  main h2{margin:0 0 14px;font-size:18px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .card{display:inline-block;min-width:150px;padding:14px 16px;margin:0 12px 12px 0;background:var(--panel);
    border:1px solid var(--line);border-radius:10px}
  .card .n{font-size:24px;font-weight:700} .card .l{color:var(--muted);font-size:12px}
  /* modal / toast */
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}
  #modal .box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;max-width:460px;width:92%}
  #toast{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:60}
  #toast div{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
    padding:10px 14px;border-radius:8px;max-width:340px}
  #toast div.err{border-left-color:var(--err)}
</style>
</head>
<body>
  <!-- LOGIN VIEW -->
  <div id="login" style="display:none">
    <h1>mixapi admin</h1>
    <p>Enter the admin key to continue.</p>
    <input id="loginKey" type="password" placeholder="ADMIN_KEY" autocomplete="off">
    <button id="loginBtn" class="primary">Sign in</button>
    <p id="loginErr" class="err" style="display:none;margin-top:12px"></p>
  </div>

  <!-- APP VIEW -->
  <div id="app">
    <nav>
      <div class="brand">mixapi</div>
      <button data-tab="pool" class="active">Pool</button>
      <button data-tab="logs">Logs</button>
      <button data-tab="stats">Stats</button>
      <button data-tab="keys">Keys</button>
      <div class="spacer"></div>
      <button id="logoutBtn">Sign out</button>
    </nav>
    <main><div id="view"></div></main>
  </div>

  <div id="modal"><div class="box" id="modalBox"></div></div>
  <div id="toast"></div>

<script>
"use strict";
const $ = (s, r=document) => r.querySelector(s);
const el = (tag, props={}, kids=[]) => {           // tiny DOM builder — NO innerHTML for data
  const n = document.createElement(tag);
  for (const k in props){
    if (k === 'class') n.className = props[k];
    else if (k === 'text') n.textContent = props[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), props[k]);
    else if (props[k] != null) n.setAttribute(k, props[k]);
  }
  for (const c of [].concat(kids)) if (c != null) n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
};

async function api(path, opts={}){
  const r = await fetch(path, {
    credentials:'same-origin',
    headers:{'content-type':'application/json'},
    ...opts,
  });
  if (r.status === 401){ showLogin(); throw new Error('unauthorized'); }
  const ct = r.headers.get('content-type') || '';
  const body = ct.includes('json') ? await r.json() : await r.text();
  if (!r.ok) throw new Error((body && body.error) || ('HTTP ' + r.status));
  return body;
}

function toast(msg, isErr){
  const t = el('div', { class: isErr ? 'err' : '', text: String(msg) });
  $('#toast').append(t);
  setTimeout(() => t.remove(), 4200);
}

// promise-based in-page confirm (NEVER window.confirm)
function confirmModal(message, confirmLabel='Confirm', danger=false){
  return new Promise((resolve) => {
    const box = $('#modalBox'); box.textContent='';
    box.append(el('p', { text: message, style:'margin:0 0 18px' }));
    const bar = el('div', { class:'row', style:'margin:0;justify-content:flex-end' }, [
      el('button', { text:'Cancel', onclick: () => { close(); resolve(false); } }),
      el('button', { text: confirmLabel, class: danger ? 'danger' : 'primary',
        onclick: () => { close(); resolve(true); } }),
    ]);
    box.append(bar);
    $('#modal').style.display='flex';
    function close(){ $('#modal').style.display='none'; }
  });
}
// show an arbitrary node in the modal (used by Keys "show once")
function showModal(node){ const b=$('#modalBox'); b.textContent=''; b.append(node); $('#modal').style.display='flex'; }
// hides the overlay AND clears modalBox — required so sensitive one-time content
// (e.g. a freshly created gateway key) never lingers in the hidden DOM after dismissal.
function closeModal(){ $('#modal').style.display='none'; $('#modalBox').textContent=''; }

// ---- formatting helpers ----
const fmtTime = (ms) => ms ? new Date(ms).toLocaleString() : '—';
const fmtCost = (n) => '$' + (Number(n)||0).toFixed(4);
const fmtNum  = (n) => (Number(n)||0).toLocaleString();
const cooldownLeft = (until) => {
  if (!until) return '—';
  const s = Math.max(0, Math.round((until - Date.now())/1000));
  return s ? (s>=60 ? Math.floor(s/60)+'m'+(s%60)+'s' : s+'s') : '—';
};

// ---- view switching ----
function showLogin(){ $('#app').style.display='none'; $('#login').style.display='block'; $('#loginKey').focus(); }
function showApp(){ $('#login').style.display='none'; $('#app').style.display='grid'; }

const RENDERERS = { pool: renderPool, logs: renderLogs, stats: renderStats, keys: renderKeys };
function selectTab(name){
  for (const b of document.querySelectorAll('nav [data-tab]')) b.classList.toggle('active', b.dataset.tab===name);
  $('#view').textContent = '';
  RENDERERS[name]().catch(e => toast(e.message, true));
}

// ---- STUBS (replaced in Tasks 2 & 3) ----
function parseModels(text){
  return String(text||'').split(/[\n,]/).map(s=>s.trim()).filter(Boolean).map(tok=>{
    const i = tok.indexOf(':');                          // split on FIRST colon only —
    const pub = (i === -1 ? tok : tok.slice(0, i)).trim(); // target IDs may contain colons (e.g. llama3:8b)
    const tgt = (i === -1 ? '' : tok.slice(i + 1)).trim();
    return { public: pub, target: tgt || pub };
  });
}
function modelsToText(models){ return (models||[]).map(m => m.public===m.target ? m.public : m.public+':'+m.target).join('\n'); }

async function renderPool(){
  const accounts = await api('/admin/accounts');
  const view = $('#view');

  function field(label, input){
    return el('div', { style:'margin-bottom:10px' }, [
      el('div', { class:'muted', style:'font-size:12px;margin-bottom:3px', text:label }),
      input,
    ]);
  }

  function refresh(){ $('#view').textContent=''; renderPool().catch(e => toast(e.message, true)); }

  function openEditForm(a){
    const baseUrlInp = el('input', { value:a.baseUrl, style:'width:100%' });
    const modelsInp = el('textarea', { rows:'3', style:'width:100%' });
    modelsInp.value = modelsToText(a.models);
    const weightInp = el('input', { type:'number', value:String(a.weight), style:'width:100%' });
    const keyInp = el('input', { type:'password', placeholder:'leave blank to keep current key', autocomplete:'new-password', style:'width:100%' });

    async function submit(){
      const body = {
        baseUrl: baseUrlInp.value.trim(),
        models: parseModels(modelsInp.value),
        weight: weightInp.value === '' ? a.weight : Number(weightInp.value),
      };
      const key = keyInp.value.trim();
      if (key) body.key = key;
      try{
        await api('/admin/accounts/' + a.id, { method:'PATCH', body: JSON.stringify(body) });
        closeModal(); toast('Account updated'); refresh();
      }catch(e){ toast(e.message, true); }
    }

    showModal(el('div', {}, [
      el('h3', { text:'Edit ' + a.name, style:'margin:0 0 14px' }),
      field('Base URL', baseUrlInp),
      field('Models (public:target per line)', modelsInp),
      field('Weight', weightInp),
      field('Key', keyInp),
      el('div', { class:'row', style:'margin:14px 0 0;justify-content:flex-end' }, [
        el('button', { text:'Cancel', onclick: closeModal }),
        el('button', { class:'primary', text:'Save', onclick: submit }),
      ]),
    ]));
  }

  function buildAddForm(){
    const nameInp = el('input', { placeholder:'name', style:'width:100%' });
    const providerInp = el('input', { value:'custom', style:'width:100%' });
    const adapterInp = el('input', { placeholder:'openai / anthropic', style:'width:100%' });
    const baseUrlInp = el('input', { placeholder:'https://api.example.com/v1', style:'width:100%' });
    const modelsInp = el('textarea', { rows:'3', placeholder:'public:target per line (bare "model" = same public/target)', style:'width:100%' });
    const weightInp = el('input', { type:'number', value:'1', style:'width:100%' });
    const keyInp = el('input', { type:'password', placeholder:'provider API key', autocomplete:'new-password', style:'width:100%' });

    async function submit(){
      const body = {
        name: nameInp.value.trim(),
        provider: providerInp.value.trim() || 'custom',
        adapter: adapterInp.value.trim(),
        baseUrl: baseUrlInp.value.trim(),
        models: parseModels(modelsInp.value),
        weight: weightInp.value === '' ? 1 : Number(weightInp.value),
        key: keyInp.value.trim(),
      };
      if (!body.name || !body.adapter || !body.baseUrl || !body.key){
        toast('name, adapter, baseUrl, key required', true); return;
      }
      try{
        await api('/admin/accounts', { method:'POST', body: JSON.stringify(body) });
        toast('Account created'); refresh();
      }catch(e){ toast(e.message, true); }
    }

    const wrap = el('div', { class:'card', style:'display:none;max-width:560px' });
    wrap.append(
      el('div', { style:'font-weight:600;margin-bottom:10px', text:'Add account' }),
      field('Name', nameInp),
      field('Provider', providerInp),
      field('Adapter', adapterInp),
      field('Base URL', baseUrlInp),
      field('Models (public:target per line)', modelsInp),
      field('Weight', weightInp),
      field('Key', keyInp),
      el('div', { class:'row', style:'margin:4px 0 0' }, [
        el('button', { class:'primary', text:'Create account', onclick: submit }),
        el('button', { text:'Cancel', onclick: () => { wrap.style.display='none'; } }),
      ]),
    );
    return wrap;
  }

  const addForm = buildAddForm();
  const addToggleBtn = el('button', { class:'primary', text:'＋ Add account', onclick: () => {
    addForm.style.display = addForm.style.display === 'none' ? 'block' : 'none';
  }});

  view.append(el('div', { class:'row', style:'justify-content:space-between' }, [
    el('h2', { text:'Pool', style:'margin:0' }),
    addToggleBtn,
  ]));
  view.append(addForm);

  const headRow = el('tr', {}, ['Name','Adapter','Models','Status','Cooldown','Errors','Last used','Weight','Actions']
    .map(h => el('th', { text:h })));

  const rows = accounts.map(a => {
    const nameCell = el('td', {}, [
      el('div', { text:a.name }),
      el('div', { class:'muted', text:a.provider }),
    ]);
    const adapterCell = el('td', { text:a.adapter });
    const modelsCell = el('td', {}, a.models.length
      ? a.models.map(m => el('div', { text:m.public + ' → ' + m.target }))
      : [ el('span', { class:'muted', text:'—' }) ]);
    const statusCell = el('td', {}, [ el('span', { class:'badge b-' + a.state.status, text:a.state.status }) ]);
    const cooldownCell = el('td', { text: cooldownLeft(a.state.cooldownUntil) });

    const errKids = [ el('div', { text:String(a.state.consecutiveErrors) }) ];
    if (a.state.lastError){
      const full = a.state.lastError;
      const short = full.length > 60 ? full.slice(0, 60) + '…' : full;
      errKids.push(el('div', { class:'muted err', text:short, title:full }));
    }
    const errCell = el('td', {}, errKids);
    const lastUsedCell = el('td', { text: fmtTime(a.state.lastUsedAt) });
    const weightCell = el('td', { text:String(a.weight) });

    const enableBtn = el('button', { text: a.enabled ? 'Disable' : 'Enable', onclick: async () => {
      try{
        await api('/admin/accounts/' + a.id, { method:'PATCH', body: JSON.stringify({ enabled: !a.enabled }) });
        toast(a.enabled ? 'Account disabled' : 'Account enabled'); refresh();
      }catch(e){ toast(e.message, true); }
    }});
    const resetBtn = el('button', { text:'Reset cooldown', onclick: async () => {
      try{
        await api('/admin/accounts/' + a.id + '/reset-cooldown', { method:'POST' });
        toast('Cooldown reset'); refresh();
      }catch(e){ toast(e.message, true); }
    }});
    const editBtn = el('button', { text:'Edit', onclick: () => openEditForm(a) });
    const delBtn = el('button', { class:'danger', text:'Delete', onclick: async () => {
      const ok = await confirmModal('Delete account "' + a.name + '"? This removes its credential and health state.', 'Delete', true);
      if (!ok) return;
      try{
        await api('/admin/accounts/' + a.id, { method:'DELETE' });
        toast('Account deleted'); refresh();
      }catch(e){ toast(e.message, true); }
    }});
    const actionsCell = el('td', {}, [
      el('div', { class:'row', style:'margin:0;flex-wrap:nowrap' }, [enableBtn, resetBtn, editBtn, delBtn]),
    ]);

    return el('tr', {}, [nameCell, adapterCell, modelsCell, statusCell, cooldownCell, errCell, lastUsedCell, weightCell, actionsCell]);
  });

  if (!rows.length){
    rows.push(el('tr', {}, [ el('td', { class:'muted', colspan:'9', text:'No accounts yet — add one above.' }) ]));
  }

  const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, rows) ]);
  view.append(el('div', { class:'wrap' }, [table]));
}
// null-safe cell text: request_logs columns besides id/ts/status are all nullable
function orDash(v, suffix=''){ return (v === null || v === undefined) ? '—' : (v + suffix); }

const logsState = { model:'', account:'', status:'', limit:'100' };

async function renderLogs(){
  const params = new URLSearchParams();
  if (logsState.model) params.set('model', logsState.model);
  if (logsState.account) params.set('account', logsState.account);
  if (logsState.status) params.set('status', logsState.status);
  if (logsState.limit) params.set('limit', logsState.limit);
  const qs = params.toString();
  const logs = await api('/admin/logs' + (qs ? '?' + qs : ''));

  const view = $('#view');

  function refresh(){ $('#view').textContent=''; renderLogs().catch(e => toast(e.message, true)); }

  const modelInp = el('input', { placeholder:'e.g. gpt-4o', value: logsState.model, style:'width:150px' });
  const accountInp = el('input', { placeholder:'account id', value: logsState.account, style:'width:170px' });
  const statusSel = el('select', {}, [
    el('option', { value:'', text:'any' }),
    el('option', { value:'ok', text:'ok' }),
    el('option', { value:'error', text:'error' }),
  ]);
  statusSel.value = logsState.status;
  const limitInp = el('input', { type:'number', placeholder:'100', value: logsState.limit, style:'width:90px' });

  function apply(){
    logsState.model = modelInp.value.trim();
    logsState.account = accountInp.value.trim();
    logsState.status = statusSel.value;
    logsState.limit = limitInp.value.trim();
    refresh();
  }

  view.append(el('h2', { text:'Logs' }));
  view.append(el('div', { class:'row' }, [
    el('span', { class:'muted', text:'Model' }), modelInp,
    el('span', { class:'muted', text:'Account' }), accountInp,
    el('span', { class:'muted', text:'Status' }), statusSel,
    el('span', { class:'muted', text:'Limit' }), limitInp,
    el('button', { class:'primary', text:'Apply', onclick: apply }),
    el('button', { text:'Refresh', onclick: refresh }),
  ]));

  const headRow = el('tr', {}, ['Time','Model','Account','Status','HTTP','Latency','Attempts','Tokens','Cost']
    .map(h => el('th', { text:h })));

  const rows = logs.map(r => {
    const cls = r.status === 'ok' ? 'b-healthy' : r.status === 'error' ? 'b-exhausted' : 'b-unknown';
    return el('tr', {}, [
      el('td', { text: fmtTime(r.ts) }),
      el('td', { text: orDash(r.public_model) }),
      el('td', { text: orDash(r.account_id) }),
      el('td', {}, [ el('span', { class:'badge ' + cls, text:r.status }) ]),
      el('td', { text: orDash(r.http_status) }),
      el('td', { text: orDash(r.latency_ms, 'ms') }),
      el('td', { text: orDash(r.attempt_count) }),
      el('td', { text: orDash(r.total_tokens) }),
      el('td', { text: fmtCost(r.est_cost) }),
    ]);
  });
  if (!rows.length){
    rows.push(el('tr', {}, [ el('td', { class:'muted', colspan:'9', text:'No logs match these filters.' }) ]));
  }

  const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, rows) ]);
  view.append(el('div', { class:'wrap' }, [table]));
}

const STATS_WINDOWS = [
  { label:'Last hour', value: 3600e3 },
  { label:'Last 24h', value: 86400e3 },
  { label:'Last 7d', value: 7 * 86400e3 },
  { label:'All time', value: 0 },
];
const statsState = { windowMs: 86400e3 };  // default: Last 24h

async function renderStats(){
  const sinceMs = statsState.windowMs === 0 ? 0 : Date.now() - statsState.windowMs;
  const stats = await api('/admin/stats?sinceMs=' + sinceMs);

  const view = $('#view');

  function statCard(label, value){
    return el('div', { class:'card' }, [
      el('div', { class:'n', text:String(value) }),
      el('div', { class:'l', text:label }),
    ]);
  }
  function groupTable(title, groups){
    const headRow = el('tr', {}, ['Key','Requests','Errors','Tokens','Cost'].map(h => el('th', { text:h })));
    const rows = (groups || []).map(g => el('tr', {}, [
      el('td', { text:String(g.key) }),
      el('td', { text:String(g.requests) }),
      el('td', { text:String(g.errors) }),
      el('td', { text:String(g.tokens) }),
      el('td', { text:fmtCost(g.cost) }),
    ]));
    if (!rows.length) rows.push(el('tr', {}, [ el('td', { class:'muted', colspan:'5', text:'No data.' }) ]));
    const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, rows) ]);
    return el('div', {}, [
      el('h3', { text:title, style:'margin:20px 0 8px;font-size:15px' }),
      el('div', { class:'wrap' }, [table]),
    ]);
  }

  const windowSel = el('select', {}, STATS_WINDOWS.map(w => el('option', { value:String(w.value), text:w.label })));
  windowSel.value = String(statsState.windowMs);
  windowSel.addEventListener('change', () => {
    statsState.windowMs = Number(windowSel.value);
    $('#view').textContent = '';
    renderStats().catch(e => toast(e.message, true));
  });

  view.append(el('h2', { text:'Stats' }));
  view.append(el('div', { class:'row' }, [ el('span', { class:'muted', text:'Window' }), windowSel ]));
  view.append(el('div', { class:'row' }, [
    statCard('Total requests', stats.totalRequests),
    statCard('Error rate', (stats.errorRate * 100).toFixed(1) + '%'),
    statCard('Tokens', fmtNum(stats.totalTokens)),
    statCard('Est. cost', fmtCost(stats.totalCost)),
  ]));
  view.append(groupTable('By model', stats.byModel));
  view.append(groupTable('By account', stats.byAccount));
}

async function renderKeys(){
  const keys = await api('/admin/gateway-keys');
  const view = $('#view');

  function refresh(){ $('#view').textContent=''; renderKeys().catch(e => toast(e.message, true)); }

  // the raw key is held only in this closure and in the modal's own input value;
  // closeModal() clears #modalBox on every dismissal path, so it never lingers in the DOM.
  function showRawKeyModal(rawKey){
    const keyInp = el('input', { class:'mono', value:rawKey, readonly:true, style:'width:100%' });
    const copyBtn = el('button', { text:'Copy', onclick: async () => {
      try{ await navigator.clipboard.writeText(rawKey); toast('Copied to clipboard'); }
      catch{ toast('Copy failed — select the field and copy manually', true); }
    }});
    showModal(el('div', {}, [
      el('h3', { text:'Gateway key created', style:'margin:0 0 12px' }),
      el('div', { class:'row', style:'margin:0 0 10px;flex-wrap:nowrap' }, [ keyInp, copyBtn ]),
      el('p', { class:'err', style:'margin:0 0 16px', text:'This is shown once — store it now. It will not be shown again.' }),
      el('div', { class:'row', style:'margin:0;justify-content:flex-end' }, [
        el('button', { class:'primary', text:'Done', onclick: () => { closeModal(); refresh(); } }),
      ]),
    ]));
  }

  function openCreateForm(){
    const nameInp = el('input', { placeholder:'name (optional)', style:'width:100%' });
    async function submit(){
      try{
        const res = await api('/admin/gateway-keys', { method:'POST', body: JSON.stringify({ name: nameInp.value.trim() }) });
        showRawKeyModal(res.key);
      }catch(e){ toast(e.message, true); }
    }
    showModal(el('div', {}, [
      el('h3', { text:'New gateway key', style:'margin:0 0 14px' }),
      el('div', { style:'margin-bottom:10px' }, [
        el('div', { class:'muted', style:'font-size:12px;margin-bottom:3px', text:'Name' }),
        nameInp,
      ]),
      el('div', { class:'row', style:'margin:14px 0 0;justify-content:flex-end' }, [
        el('button', { text:'Cancel', onclick: closeModal }),
        el('button', { class:'primary', text:'Create', onclick: submit }),
      ]),
    ]));
  }

  view.append(el('div', { class:'row', style:'justify-content:space-between' }, [
    el('h2', { text:'Keys', style:'margin:0' }),
    el('button', { class:'primary', text:'＋ New key', onclick: openCreateForm }),
  ]));

  const headRow = el('tr', {}, ['Name','Key','Status','Created','Actions'].map(h => el('th', { text:h })));

  const rows = keys.map(k => {
    const nameCell = el('td', { text: k.name || '—' });
    const keyCell = el('td', { class:'mono', text: k.keyHashPrefix + '…' });
    const statusCell = el('td', {}, [
      el('span', { class:'badge ' + (k.enabled ? 'b-healthy' : 'b-disabled'), text: k.enabled ? 'enabled' : 'disabled' }),
    ]);
    const createdCell = el('td', { text: fmtTime(k.createdAt) });
    const revokeBtn = el('button', { class:'danger', text:'Revoke', onclick: async () => {
      const label = k.name || k.keyHashPrefix;
      const ok = await confirmModal('Revoke key "' + label + '"? Clients using it stop working immediately.', 'Revoke', true);
      if (!ok) return;
      try{
        await api('/admin/gateway-keys/' + k.id, { method:'DELETE' });
        toast('Key revoked'); refresh();
      }catch(e){ toast(e.message, true); }
    }});
    const actionsCell = el('td', {}, [ revokeBtn ]);
    return el('tr', {}, [nameCell, keyCell, statusCell, createdCell, actionsCell]);
  });
  if (!rows.length){
    rows.push(el('tr', {}, [ el('td', { class:'muted', colspan:'5', text:'No gateway keys yet — create one above.' }) ]));
  }

  const table = el('table', {}, [ el('thead', {}, [headRow]), el('tbody', {}, rows) ]);
  view.append(el('div', { class:'wrap' }, [table]));
}

// ---- auth wiring ----
async function doLogin(){
  const key = $('#loginKey').value;
  $('#loginErr').style.display='none';
  try{
    await api('/admin/login', { method:'POST', body: JSON.stringify({ key }) });
    $('#loginKey').value=''; showApp(); selectTab('pool');
  }catch(e){ $('#loginErr').textContent='Invalid admin key.'; $('#loginErr').style.display='block'; }
}
$('#loginBtn').addEventListener('click', doLogin);
$('#loginKey').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
$('#logoutBtn').addEventListener('click', async () => { try{ await api('/admin/logout',{method:'POST'}); }catch{} showLogin(); });
for (const b of document.querySelectorAll('nav [data-tab]')) b.addEventListener('click', () => selectTab(b.dataset.tab));
$('#modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });

// ---- boot ----
(async function boot(){
  try{ await api('/admin/session'); showApp(); selectTab('pool'); }
  catch{ showLogin(); }
})();
</script>
</body>
</html>
