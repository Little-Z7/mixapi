# mixapi 生产栈:网关跑在 Caddy 后面(Caddy 自动 HTTPS)。
# 用法:1) cp .env.example .env 并填好  2) docker compose up -d --build
#
# 无域名 / 纯本地测试:去掉 caddy 服务,给 mixapi 加  ports: ["8080:8080"],
# 并在 .env 里加  ADMIN_INSECURE_COOKIE=1(允许 http 登录控制台;生产勿用)。
services:
  mixapi:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - mixapi-data:/data          # sqlite 数据库持久化于此(记得备份)
    expose:
      - "8080"                     # 仅容器网络内暴露;由 Caddy 终止 TLS 并反代

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data           # Let's Encrypt 证书
      - caddy-config:/config
    depends_on:
      - mixapi

volumes:
  mixapi-data:
  caddy-data:
  caddy-config:
